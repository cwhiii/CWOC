<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .checklist-view {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .chit {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .chit h3 {
            margin: 0 0 10px;
            font-size: 1.5em;
            color: #333;
        }
        .chit h3 a {
            text-decoration: none;
            color: #C66B6B;
        }
        .chit h3 a:hover {
            text-decoration: underline;
        }
        .checklist {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .checklist li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            font-size: 1.1em;
        }
        .checklist li:last-child {
            border-bottom: none;
        }
        .checklist li input[type="checkbox"] {
            margin-right: 10px;
        }
        .checklist li.completed {
            text-decoration: line-through;
            color: #888;
        }
        .add-item {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .add-item input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
        }
        .add-item button {
            padding: 8px 15px;
            background-color: #C66B6B;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        .add-item button:hover {
            background-color: #a55757;
        }
        .no-chits {
            text-align: center;
            color: #888;
            font-size: 1.2em;
        }
        .error-message {
            text-align: center;
            color: #C66B6B;
            padding: 20px;
            border: 1px solid #C66B6B;
            border-radius: 5px;
            margin-top: 20px;
        }
        .error-message button {
            padding: 8px 15px;
            background-color: #C66B6B;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        .error-message button:hover {
            background-color: #a55757;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Checklist</h1>
        <div id="checklist-view" class="checklist-view"></div>
    </div>

    <script>
        let chits = [];

        function fetchChits() {
            console.log("Fetching chits...");
            fetch("/api/chits")
                .then((response) => {
                    if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
                    return response.json();
                })
                .then((data) => {
                    chits = Array.isArray(data) ? data : [];
                    console.log("Fetched chits:", chits);
                    displayChecklist();
                })
                .catch((err) => {
                    console.error("Error fetching chits:", err);
                    document.getElementById("checklist-view").innerHTML = `
                        <div class="error-message">
                            <h3>Error loading checklists</h3>
                            <p>${err.message}</p>
                            <button onclick="fetchChits()">Try Again</button>
                        </div>
                    `;
                });
        }

        function displayChecklist() {
            const checklistView = document.getElementById("checklist-view");
            checklistView.innerHTML = "";

            const sortedChits = [...chits]
                .filter(chit => chit.checklist && Array.isArray(chit.checklist) && chit.checklist.length > 0)
                .sort((a, b) => {
                    const dateA = new Date(a.last_edited || a.created_datetime || a.start_datetime || 0);
                    const dateB = new Date(b.last_edited || b.created_datetime || b.start_datetime || 0);
                    return dateB - dateA;
                });

            if (sortedChits.length === 0) {
                checklistView.innerHTML = '<p class="no-chits">No checklists found.</p>';
                return;
            }

            sortedChits.forEach((chit) => {
                const chitElement = document.createElement("div");
                chitElement.className = "chit";
                chitElement.innerHTML = `<h3><a href="/editor?id=${chit.id}">${chit.title}</a></h3>`;

                const checklist = document.createElement("ul");
                checklist.className = "checklist";
                chit.checklist.forEach((item, index) => {
                    if (item && typeof item === "object" && item.text) {
                        const listItem = document.createElement("li");
                        listItem.className = item.done ? "completed" : "";
                        listItem.innerHTML = `
                            <input type="checkbox" ${item.done ? "checked" : ""} data-chit-id="${chit.id}" data-item-index="${index}">
                            ${item.text}
                        `;
                        checklist.appendChild(listItem);
                    }
                });

                const addItemForm = document.createElement("div");
                addItemForm.className = "add-item";
                addItemForm.innerHTML = `
                    <input type="text" placeholder="New checklist item" data-chit-id="${chit.id}">
                    <button onclick="addChecklistItem('${chit.id}', this)">Add</button>
                `;
                chitElement.appendChild(checklist);
                chitElement.appendChild(addItemForm);
                checklistView.appendChild(chitElement);
            });

            // Add event listeners for checkboxes
            document.querySelectorAll('.checklist input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener("change", (e) => {
                    const chitId = e.target.dataset.chitId;
                    const itemIndex = parseInt(e.target.dataset.itemIndex);
                    updateChecklistItem(chitId, itemIndex, e.target.checked);
                });
            });
        }

        function addChecklistItem(chitId, button) {
            const input = button.previousElementSibling;
            const text = input.value.trim();
            if (!text) return;

            const chit = chits.find(c => c.id === chitId);
            if (!chit) return;

            const updatedChecklist = chit.checklist ? [...chit.checklist, { text, done: false }] : [{ text, done: false }];
            const updatedChit = { ...chit, checklist: updatedChecklist };

            fetch(`/api/chits/${chitId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updatedChit)
            })
                .then((response) => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    input.value = "";
                    fetchChits();
                })
                .catch((err) => {
                    console.error("Error adding checklist item:", err);
                    alert("Failed to add checklist item.");
                });
        }

        function updateChecklistItem(chitId, itemIndex, done) {
            const chit = chits.find(c => c.id === chitId);
            if (!chit || !chit.checklist[itemIndex]) return;

            const updatedChecklist = [...chit.checklist];
            updatedChecklist[itemIndex] = { ...updatedChecklist[itemIndex], done };
            const updatedChit = { ...chit, checklist: updatedChecklist };

            fetch(`/api/chits/${chitId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updatedChit)
            })
                .then((response) => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    fetchChits();
                })
                .catch((err) => {
                    console.error("Error updating checklist item:", err);
                    alert("Failed to update checklist item.");
                });
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetchChits();
        });
    </script>
</body>
</html>
