<!doctype html>
<html lang="en">
    <head>
        <link
            rel="icon"
            type="image/x-icon"
            href="/static/cwod_logo-favicon.png"
        />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>1450 - C.W.'s Omni Chits</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
        />
        <link rel="stylesheet" href="/frontend/styles.css" />
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    </head>
    <body>
        <button class="toggle-sidebar" onclick="toggleSidebar()">
            Toggle Sidebar
        </button>
        <div class="sidebar" id="sidebar">
            <h2>Filters & Views</h2>
            <div class="status-filter" style="margin-bottom: 10px">
                <label for="status-filter">Status:</label>
                <select id="status-filter" onchange="filterByStatus()">
                    <option value="">Any Status</option>
                    <option value="ToDo">ToDo</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Blocked">Blocked</option>
                    <option value="Complete">Complete</option>
                </select>
            </div>
            <div class="view-selector">
                <label for="view-select">View:</label>
                <select id="view-select" onchange="switchView(this.value)">
                    <option value="Day">Day</option>
                    <option value="Week" selected>Week</option>
                    <option value="Month">Month</option>
                    <option value="Year">Year</option>
                    <option value="Itinerary">Itinerary</option>
                </select>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="filterChits('Calendar')">
                    Calendar
                </div>
                <div class="tab" onclick="filterChits('Checklists')">
                    Checklists
                </div>
                <div class="tab" onclick="filterChits('Alarms')">Alarms</div>
                <div class="tab" onclick="filterChits('Projects')">
                    Projects
                </div>
                <div class="tab" onclick="filterChits('Tasks')">Tasks</div>
                <div class="tab" onclick="filterChits('Notes')">Notes</div>
            </div>
            <div class="search-bar">
                <input
                    type="text"
                    id="search"
                    placeholder="Search Chits..."
                    onkeyup="searchChits()"
                />
            </div>
            <button
                class="create-chit"
                onclick="window.location.href='frontend/editor/editor.html'"
            >
                Create Chit
            </button>
        </div>

        <div class="main-wrapper">
            <div class="content-area" id="content-area">
                <div class="header">
                    <img
                        src="/static/cwod_logo-favicon.png"
                        alt="Logo"
                        class="logo"
                    />
                    <h1>1450 - C.W.'s Omni Chits</h1>
                    <div class="period-navigation">
                        <button onclick="prevPeriod()">◄</button>
                        <span id="date-range">6/2/2025 - 6/8/2025</span>
                        <button onclick="nextPeriod()">►</button>
                    </div>
                </div>
                <div class="calendar-view" id="calendar-view"></div>
                <div class="chit-list" id="chit-list"></div>
            </div>
        </div>
        <script src="/frontend/main.js"></script>
    </body>
</html>
