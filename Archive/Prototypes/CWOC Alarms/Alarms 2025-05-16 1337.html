<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CWOC Alarms</title>
        <link
            href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
            rel="stylesheet"
        />
        <style>
            body {
                background-image: url("https://www.transparenttextures.com/patterns/parchment.png");
                background-color: #f8f1e9;
                color: #4a3728;
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                padding: 0;
            }
            .container {
                max-width: 1000px;
                margin: 40px auto;
                background: linear-gradient(to bottom, #f8f1e9, #e6d8c2);
                border: 4px solid #8b6f47;
                border-radius: 12px;
                box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
                padding: 24px;
            }
            .header {
                display: flex;
                align-items: center;
                gap: 20px;
                margin-bottom: 20px;
            }
            .header img {
                height: 60px;
            }
            .tabs {
                display: flex;
                justify-content: space-around;
                border-bottom: 2px solid #8b6f47;
                margin-bottom: 20px;
            }
            .tab {
                padding: 12px 24px;
                cursor: pointer;
                font-size: 18px;
                color: #4a3728;
                background: #e6d8c2;
                border-radius: 8px 8px 0 0;
                transition: background 0.3s;
            }
            .tab:hover,
            .tab.active {
                background: #d1c2a3;
            }
            .content {
                display: none;
            }
            .content.active {
                display: block;
            }
            .clock-container {
                display: flex;
                justify-content: space-between;
                gap: 20px;
            }
            .clock {
                text-align: center;
                flex: 1;
            }
            .digital-clock {
                font-size: 36px;
            }
            .digital-clock .seconds {
                font-size: 24px;
            }
            .metric-clock {
                font-family: "Courier New", monospace;
                background: #e6d8c2;
                padding: 10px;
                border: 2px solid #8b6f47;
                border-radius: 8px;
                font-size: 36px;
            }
            .metric-progress {
                width: 100%;
                height: 20px;
                background: #f8f1e9;
                border: 2px solid #8b6f47;
                border-radius: 8px;
                margin-top: 10px;
            }
            .metric-progress div {
                height: 100%;
                background: #8b6f47;
                border-radius: 4px;
                transition: width 1s linear;
            }
            .analog-clock {
                width: 150px;
                height: 150px;
                border: 4px solid #8b6f47;
                border-radius: 50%;
                position: relative;
                background: #f8f1e9;
                margin: 0 auto;
            }
            .clock-dot {
                position: absolute;
                width: 6px;
                height: 6px;
                background: #4a3728;
                border-radius: 50%;
                transform: translate(-50%, -50%);
            }
            .clock-label {
                position: absolute;
                font-size: 12px;
                transform: translate(-50%, -50%);
            }
            .hand {
                position: absolute;
                bottom: 50%;
                left: 50%;
                transform-origin: bottom;
                background: #4a3728;
            }
            .hour-hand {
                width: 4px;
                height: 40px;
            }
            .minute-hand {
                width: 3px;
                height: 60px;
            }
            .second-hand {
                width: 2px;
                height: 70px;
                background: #a68a64;
            }
            .alarm-list,
            .timer-list {
                width: 100%;
                margin-top: 20px;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                background: #e6d8c2;
                border: 2px solid #8b6f47;
                border-radius: 8px;
            }
            th,
            td {
                padding: 10px;
                text-align: left;
                border-bottom: 1px solid #8b6f47;
            }
            th {
                background: #d1c2a3;
                font-weight: bold;
            }
            .stopwatch {
                text-align: center;
                font-size: 36px;
            }
            button {
                background: #8b6f47;
                color: #f8f1e9;
                border: none;
                padding: 8px 16px;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0.3s;
            }
            button:hover {
                background: #a68a64;
            }
            input,
            select {
                background: #f8f1e9;
                border: 2px solid #8b6f47;
                padding: 8px;
                border-radius: 8px;
                color: #4a3728;
            }
            .time-input {
                display: flex;
                gap: 5px;
                align-items: center;
            }
            .time-input input {
                width: 60px;
                text-align: center;
            }
            .days-select {
                display: flex;
                gap: 10px;
                margin-top: 10px;
            }
            .days-select label {
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                justify-content: center;
                align-items: center;
            }
            .modal-content {
                background: #f8f1e9;
                padding: 20px;
                border: 4px solid #8b6f47;
                border-radius: 12px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <img src="alarms_logo.png" alt="CWOC Alarms Logo" />
                <h1 class="text-3xl">Alarms</h1>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="showTab('clock')">Clock</div>
                <div class="tab" onclick="showTab('alarm')">Alarm</div>
                <div class="tab" onclick="showTab('timer')">Timer</div>
                <div class="tab" onclick="showTab('stopwatch')">Stopwatch</div>
            </div>
            <div id="clock" class="content active">
                <div class="clock-container">
                    <div class="clock">
                        <div class="digital-clock" id="digitalClock">
                            00:00:<span class="seconds">00</span>
                        </div>
                        <p>24-Hour</p>
                    </div>
                    <div class="clock metric-clock">
                        <div id="metricClock">0.00</div>
                        <div class="metric-progress">
                            <div id="metricProgress"></div>
                        </div>
                        <p>Metric</p>
                    </div>
                    <div class="clock">
                        <div class="analog-clock">
                            <div class="hand hour-hand" id="hourHand"></div>
                            <div class="hand minute-hand" id="minuteHand"></div>
                            <div class="hand second-hand" id="secondHand"></div>
                            <!-- Hour Dots and Labels -->
                            <div
                                class="clock-dot"
                                style="top: 10%; left: 50%"
                            ></div>
                            <div class="clock-label" style="top: 5%; left: 50%">
                                12
                            </div>
                            <div
                                class="clock-dot"
                                style="top: 25%; left: 75%"
                            ></div>
                            <div
                                class="clock-label"
                                style="top: 20%; left: 80%"
                            >
                                1
                            </div>
                            <div
                                class="clock-dot"
                                style="top: 50%; left: 90%"
                            ></div>
                            <div
                                class="clock-label"
                                style="top: 50%; left: 95%"
                            >
                                3
                            </div>
                            <div
                                class="clock-dot"
                                style="top: 75%; left: 75%"
                            ></div>
                            <div
                                class="clock-label"
                                style="top: 80%; left: 80%"
                            >
                                5
                            </div>
                            <div
                                class="clock-dot"
                                style="top: 90%; left: 50%"
                            ></div>
                            <div
                                class="clock-label"
                                style="top: 95%; left: 50%"
                            >
                                6
                            </div>
                            <div
                                class="clock-dot"
                                style="top: 75%; left: 25%"
                            ></div>
                            <div
                                class="clock-label"
                                style="top: 80%; left: 20%"
                            >
                                7
                            </div>
                            <div
                                class="clock-dot"
                                style="top: 50%; left: 10%"
                            ></div>
                            <div class="clock-label" style="top: 50%; left: 5%">
                                9
                            </div>
                            <div
                                class="clock-dot"
                                style="top: 25%; left: 25%"
                            ></div>
                            <div
                                class="clock-label"
                                style="top: 20%; left: 20%"
                            >
                                11
                            </div>
                        </div>
                        <p>Analog</p>
                    </div>
                </div>
            </div>
            <div id="alarm" class="content">
                <div class="flex gap-4 mb-4">
                    <input
                        type="text"
                        id="alarmName"
                        placeholder="Alarm Name"
                        class="flex-1"
                    />
                    <div class="time-input">
                        <input
                            type="number"
                            id="alarmHours"
                            placeholder="HH"
                            min="0"
                            max="23"
                            step="1"
                        />
                        <span>:</span>
                        <input
                            type="number"
                            id="alarmMinutes"
                            placeholder="MM"
                            min="0"
                            max="59"
                            step="1"
                        />
                    </div>
                    <button id="alarmSubmit" onclick="addAlarm()">
                        Add Alarm
                    </button>
                </div>
                <div class="days-select">
                    <label
                        ><input
                            type="checkbox"
                            class="day"
                            value="Mon"
                        />Mon</label
                    >
                    <label
                        ><input
                            type="checkbox"
                            class="day"
                            value="Tue"
                        />Tue</label
                    >
                    <label
                        ><input
                            type="checkbox"
                            class="day"
                            value="Wed"
                        />Wed</label
                    >
                    <label
                        ><input
                            type="checkbox"
                            class="day"
                            value="Thu"
                        />Thu</label
                    >
                    <label
                        ><input
                            type="checkbox"
                            class="day"
                            value="Fri"
                        />Fri</label
                    >
                    <label
                        ><input
                            type="checkbox"
                            class="day"
                            value="Sat"
                        />Sat</label
                    >
                    <label
                        ><input
                            type="checkbox"
                            class="day"
                            value="Sun"
                        />Sun</label
                    >
                </div>
                <table id="alarmList" class="alarm-list"></table>
            </div>
            <div id="timer" class="content">
                <div class="flex gap-4 mb-4">
                    <input
                        type="text"
                        id="timerName"
                        placeholder="Timer Name"
                        class="flex-1"
                    />
                    <div class="time-input">
                        <input
                            type="number"
                            id="timerHours"
                            placeholder="HH"
                            min="0"
                            step="1"
                        />
                        <span>:</span>
                        <input
                            type="number"
                            id="timerMinutes"
                            placeholder="MM"
                            min="0"
                            max="59"
                            step="1"
                        />
                        <span>:</span>
                        <input
                            type="number"
                            id="timerSeconds"
                            placeholder="SS"
                            min="0"
                            max="59"
                            step="1"
                        />
                    </div>
                    <button onclick="addTimer()">Add & Start Timer</button>
                </div>
                <label><input type="checkbox" id="timerLoop" />Loop</label>
                <table id="timerList" class="timer-list"></table>
            </div>
            <div id="stopwatch" class="content">
                <div class="stopwatch" id="stopwatchDisplay">00:00:00.000</div>
                <div class="flex gap-4 mt-4">
                    <button id="stopwatchToggle" onclick="toggleStopwatch()">
                        Start
                    </button>
                    <button onclick="resetStopwatch()">Reset</button>
                </div>
            </div>
        </div>
        <div id="modal" class="modal">
            <div class="modal-content">
                <h2 id="modalTitle"></h2>
                <p>
                    Time since expiration: <span id="modalTime">00:00:00</span>
                </p>
                <button onclick="closeModal()">Close</button>
            </div>
        </div>
        <audio
            id="alarmSound"
            src="https://freesound.org/data/previews/316/316847_4939433-lq.mp3"
        ></audio>
        <audio
            id="timerSound"
            src="https://freesound.org/data/previews/254/254714_4593123-lq.mp3"
        ></audio>
        <audio
            id="stopwatchSound"
            src="https://freesound.org/data/previews/397/397356_1131691-lq.mp3"
        ></audio>
        <script>
            // Tab Switching
            function showTab(tabId) {
                document
                    .querySelectorAll(".tab")
                    .forEach((tab) => tab.classList.remove("active"));
                document
                    .querySelectorAll(".content")
                    .forEach((content) => content.classList.remove("active"));
                document
                    .querySelector(`[onclick="showTab('${tabId}')"]`)
                    .classList.add("active");
                document.getElementById(tabId).classList.add("active");
            }

            // Clock
            function updateClocks() {
                const now = new Date();
                // 24-Hour Digital Clock
                const timeString = now.toLocaleTimeString("en-US", {
                    hour12: false,
                });
                const [hours, minutes, seconds] = timeString.split(":");
                document.getElementById("digitalClock").innerHTML =
                    `${hours}:${minutes}:<span class="seconds">${seconds}</span>`;
                // Metric Clock
                const totalSeconds =
                    now.getHours() * 3600 +
                    now.getMinutes() * 60 +
                    now.getSeconds();
                const metricTime = (totalSeconds / 86400) * 100;
                document.getElementById("metricClock").textContent =
                    metricTime.toFixed(2);
                document.getElementById("metricProgress").style.width =
                    `${metricTime}%`;
                // Analog Clock
                const hourDeg =
                    ((now.getHours() % 12) + now.getMinutes() / 60) * 30;
                const minuteDeg =
                    (now.getMinutes() + now.getSeconds() / 60) * 6;
                const secondDeg = now.getSeconds() * 6;
                document.getElementById("hourHand").style.transform =
                    `rotate(${hourDeg}deg)`;
                document.getElementById("minuteHand").style.transform =
                    `rotate(${minuteDeg}deg)`;
                document.getElementById("secondHand").style.transform =
                    `rotate(${secondDeg}deg)`;
            }
            setInterval(updateClocks, 1000);
            updateClocks();

            // Modal
            let modalInterval;
            function showModal(title, startTime) {
                document.getElementById("modalTitle").textContent = title;
                document.getElementById("modal").style.display = "flex";
                function updateModalTime() {
                    const now = new Date();
                    const diff = now - startTime;
                    const hours = Math.floor(diff / 3600000);
                    const minutes = Math.floor((diff % 3600000) / 60000);
                    const seconds = Math.floor((diff % 60000) / 1000);
                    document.getElementById("modalTime").textContent =
                        `${hours.toString().padStart(2, "0")}:${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
                }
                updateModalTime();
                modalInterval = setInterval(updateModalTime, 1000);
            }
            function closeModal() {
                document.getElementById("modal").style.display = "none";
                clearInterval(modalInterval);
            }

            // Alarms
            let alarms = JSON.parse(localStorage.getItem("alarms")) || [];
            let editingAlarmIndex = null;
            function addAlarm() {
                const name =
                    document.getElementById("alarmName").value || "Alarm";
                const hours = document
                    .getElementById("alarmHours")
                    .value.padStart(2, "0");
                const minutes = document
                    .getElementById("alarmMinutes")
                    .value.padStart(2, "0");
                const time = `${hours}:${minutes}`;
                const days = Array.from(
                    document.querySelectorAll(".day:checked"),
                ).map((d) => d.value);
                if (
                    !hours ||
                    !minutes ||
                    !/([01]?[0-9]|2[0-3]):[0-5][0-9]/.test(time)
                )
                    return;
                if (editingAlarmIndex !== null) {
                    alarms[editingAlarmIndex] = {
                        name,
                        time,
                        days,
                        enabled: alarms[editingAlarmIndex].enabled,
                    };
                    editingAlarmIndex = null;
                    document.getElementById("alarmSubmit").textContent =
                        "Add Alarm";
                } else {
                    alarms.push({ name, time, days, enabled: true });
                }
                localStorage.setItem("alarms", JSON.stringify(alarms));
                renderAlarms();
                resetAlarmForm();
            }
            function editAlarm(index) {
                const alarm = alarms[index];
                document.getElementById("alarmName").value = alarm.name;
                const [hours, minutes] = alarm.time.split(":");
                document.getElementById("alarmHours").value = hours;
                document.getElementById("alarmMinutes").value = minutes;
                document
                    .querySelectorAll(".day")
                    .forEach((d) => (d.checked = alarm.days.includes(d.value)));
                editingAlarmIndex = index;
                document.getElementById("alarmSubmit").textContent =
                    "Update Alarm";
            }
            function toggleAlarm(index) {
                alarms[index].enabled = !alarms[index].enabled;
                localStorage.setItem("alarms", JSON.stringify(alarms));
                renderAlarms();
            }
            function deleteAlarm(index) {
                alarms.splice(index, 1);
                localStorage.setItem("alarms", JSON.stringify(alarms));
                renderAlarms();
            }
            function resetAlarmForm() {
                document.getElementById("alarmName").value = "";
                document.getElementById("alarmHours").value = "";
                document.getElementById("alarmMinutes").value = "";
                document
                    .querySelectorAll(".day")
                    .forEach((d) => (d.checked = false));
            }
            function renderAlarms() {
                const table = document.getElementById("alarmList");
                table.innerHTML = `
                <tr>
                    <th>Name</th>
                    <th>Time</th>
                    <th>Days</th>
                    <th>Actions</th>
                </tr>
            `;
                alarms.forEach((alarm, index) => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                    <td>${alarm.name}</td>
                    <td>${alarm.time}</td>
                    <td>${alarm.days.join(", ")}</td>
                    <td>
                        <button onclick="editAlarm(${index})">Edit</button>
                        <button onclick="toggleAlarm(${index})">${alarm.enabled ? "Disable" : "Enable"}</button>
                        <button onclick="deleteAlarm(${index})">Delete</button>
                    </td>
                `;
                    table.appendChild(row);
                });
            }
            function checkAlarms() {
                const now = new Date();
                const time = now.toLocaleTimeString("en-US", {
                    hour12: false,
                    hour: "2-digit",
                    minute: "2-digit",
                });
                const day = now.toLocaleDateString("en-US", {
                    weekday: "short",
                });
                alarms.forEach((alarm) => {
                    if (
                        alarm.enabled &&
                        alarm.time === time &&
                        alarm.days.includes(day)
                    ) {
                        document.getElementById("alarmSound").play();
                        showModal(`Alarm: ${alarm.name}`, new Date());
                    }
                });
            }
            setInterval(checkAlarms, 60000);
            renderAlarms();

            // Timers
            let timers = JSON.parse(localStorage.getItem("timers")) || [];
            let editingTimerIndex = null;
            function addTimer() {
                const name =
                    document.getElementById("timerName").value || "Timer";
                const hours =
                    parseInt(document.getElementById("timerHours").value) || 0;
                const minutes =
                    parseInt(document.getElementById("timerMinutes").value) ||
                    0;
                const seconds =
                    parseInt(document.getElementById("timerSeconds").value) ||
                    0;
                const loop = document.getElementById("timerLoop").checked;
                const totalTime =
                    (hours * 3600 + minutes * 60 + seconds) * 1000;
                if (totalTime <= 0) return;
                if (editingTimerIndex !== null) {
                    timers[editingTimerIndex] = {
                        name,
                        time: totalTime,
                        initialTime: totalTime,
                        running: timers[editingTimerIndex].running,
                        loop,
                    };
                    editingTimerIndex = null;
                } else {
                    timers.push({
                        name,
                        time: totalTime,
                        initialTime: totalTime,
                        running: true,
                        loop,
                        interval: setInterval(
                            () => updateTimer(timers.length),
                            1000,
                        ),
                    });
                }
                localStorage.setItem("timers", JSON.stringify(timers));
                renderTimers();
                resetTimerForm();
            }
            function editTimer(index) {
                const timer = timers[index];
                document.getElementById("timerName").value = timer.name;
                const hours = Math.floor(timer.initialTime / 3600000);
                const minutes = Math.floor(
                    (timer.initialTime % 3600000) / 60000,
                );
                const seconds = Math.floor((timer.initialTime % 60000) / 1000);
                document.getElementById("timerHours").value = hours;
                document.getElementById("timerMinutes").value = minutes;
                document.getElementById("timerSeconds").value = seconds;
                document.getElementById("timerLoop").checked = timer.loop;
                editingTimerIndex = index;
            }
            function startTimer(index) {
                if (!timers[index].running) {
                    timers[index].running = true;
                    timers[index].interval = setInterval(
                        () => updateTimer(index),
                        1000,
                    );
                    localStorage.setItem("timers", JSON.stringify(timers));
                    renderTimers();
                }
            }
            function pauseTimer(index) {
                if (timers[index].running) {
                    clearInterval(timers[index].interval);
                    timers[index].running = false;
                    localStorage.setItem("timers", JSON.stringify(timers));
                    renderTimers();
                }
            }
            function resetTimer(index) {
                clearInterval(timers[index].interval);
                timers[index].running = false;
                timers[index].time = timers[index].initialTime;
                localStorage.setItem("timers", JSON.stringify(timers));
                renderTimers();
            }
            function deleteTimer(index) {
                clearInterval(timers[index].interval);
                timers.splice(index, 1);
                localStorage.setItem("timers", JSON.stringify(timers));
                renderTimers();
            }
            function updateTimer(index) {
                timers[index].time -= 1000;
                if (timers[index].time <= 0) {
                    document.getElementById("timerSound").play();
                    showModal(`Timer: ${timers[index].name}`, new Date());
                    if (timers[index].loop) {
                        timers[index].time = timers[index].initialTime;
                    } else {
                        clearInterval(timers[index].interval);
                        timers[index].running = false;
                    }
                }
                localStorage.setItem("timers", JSON.stringify(timers));
                renderTimers();
            }
            function resetTimerForm() {
                document.getElementById("timerName").value = "";
                document.getElementById("timerHours").value = "";
                document.getElementById("timerMinutes").value = "";
                document.getElementById("timerSeconds").value = "";
                document.getElementById("timerLoop").checked = false;
            }
            function renderTimers() {
                const table = document.getElementById("timerList");
                table.innerHTML = `
                <tr>
                    <th>Name</th>
                    <th>Time</th>
                    <th>Loop</th>
                    <th>Actions</th>
                </tr>
            `;
                timers.forEach((timer, index) => {
                    const hours = Math.floor(timer.time / 3600000);
                    const minutes = Math.floor((timer.time % 3600000) / 60000);
                    const seconds = Math.floor((timer.time % 60000) / 1000);
                    const row = document.createElement("tr");
                    row.innerHTML = `
                    <td>${timer.name}</td>
                    <td>${hours.toString().padStart(2, "0")}:${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}</td>
                    <td>${timer.loop ? "Yes" : "No"}</td>
                    <td>
                        <button onclick="editTimer(${index})">Edit</button>
                        <button onclick="${timer.running ? `pauseTimer(${index})` : `startTimer(${index})`}">${timer.running ? "Pause" : "Start"}</button>
                        <button onclick="resetTimer(${index})">Reset</button>
                        <button onclick="deleteTimer(${index})">Delete</button>
                    </td>
                `;
                    table.appendChild(row);
                });
            }
            renderTimers();

            // Stopwatch
            let stopwatchInterval,
                stopwatchTime = 0,
                stopwatchRunning = false;
            function toggleStopwatch() {
                if (!stopwatchRunning) {
                    stopwatchRunning = true;
                    document.getElementById("stopwatchToggle").textContent =
                        "Pause";
                    stopwatchInterval = setInterval(updateStopwatch, 10);
                } else {
                    stopwatchRunning = false;
                    document.getElementById("stopwatchToggle").textContent =
                        "Start";
                    clearInterval(stopwatchInterval);
                }
            }
            function updateStopwatch() {
                stopwatchTime += 10;
                const hours = Math.floor(stopwatchTime / 3600000);
                const minutes = Math.floor((stopwatchTime % 3600000) / 60000);
                const seconds = Math.floor((stopwatchTime % 60000) / 1000);
                const millis = stopwatchTime % 1000;
                document.getElementById("stopwatchDisplay").textContent =
                    `${hours.toString().padStart(2, "0")}:${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}.${millis.toString().padStart(3, "0")}`;
            }
            function resetStopwatch() {
                if (stopwatchRunning) {
                    toggleStopwatch();
                }
                if (stopwatchTime > 0) {
                    document.getElementById("stopwatchSound").play();
                    showModal("Stopwatch", new Date());
                }
                stopwatchTime = 0;
                document.getElementById("stopwatchDisplay").textContent =
                    "00:00:00.000";
            }
        </script>
    </body>
</html>
