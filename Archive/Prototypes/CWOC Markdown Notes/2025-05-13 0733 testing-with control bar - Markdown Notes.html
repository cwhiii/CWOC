<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Markdown Editor</title>
        <script src="https://cdn.jsdelivr.net/npm/marked@4.0.0/marked.min.js"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Playfair+Display&display=swap");

            body {
                background-color: #f5f5dc;
                font-family: "Playfair Display", serif;
                color: #4b2e2a;
                margin: 0;
                padding: 0;
            }

            .nav {
                background-color: #8b4513;
                padding: 10px;
                text-align: center;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            }

            .nav a {
                color: white;
                margin: 0 15px;
                text-decoration: none;
                font-size: 1.2em;
                transition: color 0.3s ease;
            }

            .nav a:hover {
                color: #fff8e7;
            }

            .toolbar {
                background-color: #fff8e7;
                padding: 10px;
                margin: 10px auto;
                max-width: 800px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
            }

            .toolbar button,
            .toolbar select {
                background-color: #8b4513;
                color: white;
                border: none;
                border-radius: 5px;
                padding: 8px 12px;
                cursor: pointer;
                font-size: 1em;
                font-family: "Playfair Display", serif;
                transition: background-color 0.3s ease;
            }

            .toolbar button:hover,
            .toolbar select:hover {
                background-color: #a0522d;
            }

            .content {
                display: flex;
                max-width: 800px;
                margin: 0 auto;
                padding: 10px;
            }

            #editor,
            #preview {
                width: 50%;
                height: 400px;
                padding: 10px;
                box-sizing: border-box;
                background-color: #fff8e7;
                border: 1px solid #8b7d6b;
                box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            }

            #editor {
                white-space: pre-wrap;
                outline: none;
                font-size: 1em;
                color: #4b2e2a;
            }

            #preview {
                overflow-y: auto;
                font-size: 1em;
                color: #4b2e2a;
            }
        </style>
    </head>
    <body>
        <div class="nav">
            <a href="#" onclick="loadPage('index')">Index</a>
            <a href="#" onclick="loadPage('editor')">Editor</a>
            <a href="#" onclick="loadPage('settings')">Settings</a>
        </div>
        <div class="toolbar">
            <select
                title="Apply heading level"
                onchange="applyFormat(this.value, 'heading')"
            >
                <option value="none">Header</option>
                <option value="h1">📜 H1</option>
                <option value="h2">📄 H2</option>
                <option value="h3">📑 H3</option>
            </select>
            <button title="Bold text (**text**)" onclick="applyFormat('bold')">
                💪
            </button>
            <button
                title="Italic text (*text*)"
                onclick="applyFormat('italic')"
            >
                ✍
            </button>
            <button
                title="Strikethrough text (~~text~~)"
                onclick="applyFormat('strikethrough')"
            >
                🚫
            </button>
            <button
                title="Highlight text (==text==)"
                onclick="applyFormat('highlight')"
            >
                🖍
            </button>
            <button
                title="Insert link ([text](url))"
                onclick="applyFormat('link')"
            >
                🌐
            </button>
            <button title="Inline code (`code`)" onclick="applyFormat('code')">
                ⌨
            </button>
            <button
                title="Blockquote (> text)"
                onclick="applyFormat('blockquote')"
            >
                💬
            </button>
            <select
                title="Apply list formatting"
                onchange="applyFormat(this.value, 'lists')"
            >
                <option value="none">Lists</option>
                <option value="ul">⭕ Unordered List</option>
                <option value="ol">➊ Ordered List</option>
                <option value="checklist">☑ Checklist</option>
            </select>
            <select
                title="Insert code block (```lang)"
                onchange="applyFormat(this.value, 'fencedCode')"
            >
                <option value="none">Code Block</option>
                <option value="js">📝 JavaScript</option>
                <option value="python">🐍 Python</option>
                <option value="html">🖹 HTML</option>
                <option value="css">🎨 CSS</option>
                <option value="java">☕ Java</option>
                <option value="cpp">🔧 C++</option>
                <option value="sql">🗄 SQL</option>
                <option value="bash">🖳 Bash</option>
                <option value="none">📄 Plain</option>
            </select>
            <button
                title="Indented code (    code)"
                onclick="applyFormat('indentedCode')"
            >
                🖽
            </button>
            <button
                title="Insert table (| Syntax | Description |)"
                onclick="applyFormat('table')"
            >
                📇
            </button>
            <button
                title="Insert image (![alt](url))"
                onclick="applyFormat('image')"
            >
                🖼
            </button>
            <button title="Horizontal rule (---)" onclick="applyFormat('hr')">
                📏
            </button>
        </div>
        <div class="content">
            <div
                id="editor"
                contenteditable="true"
                oninput="updatePreview()"
            ></div>
            <div id="preview"></div>
        </div>
        <script>
            const editor = document.getElementById("editor");
            const preview = document.getElementById("preview");
            const serverUrl = "http://192.168.x.x:port"; // Replace with your server's URL

            function updatePreview() {
                preview.innerHTML = marked.parse(editor.innerText);
            }

            function applyFormat(type, category = null) {
                if (type === "none") return;
                const selection = window.getSelection();
                if (!selection.rangeCount) return;
                const range = selection.getRangeAt(0);
                const selectedText = range.toString();

                let newText = selectedText;
                let insertText = "";
                let isBlock = false;

                switch (category ? category : type) {
                    case "heading":
                        if (type === "h1") newText = `# ${selectedText}`;
                        else if (type === "h2") newText = `## ${selectedText}`;
                        else if (type === "h3") newText = `### ${selectedText}`;
                        isBlock = true;
                        break;
                    case "bold":
                        newText = `**${selectedText}**`;
                        break;
                    case "italic":
                        newText = `*${selectedText}*`;
                        break;
                    case "strikethrough":
                        newText = `~~${selectedText}~~`;
                        break;
                    case "highlight":
                        newText = `==${selectedText}==`;
                        break;
                    case "link":
                        const url = prompt("Enter URL:", "https://example.com");
                        const text =
                            selectedText || prompt("Enter link text:", "Link");
                        if (url && text) newText = `[${text}](${url})`;
                        break;
                    case "code":
                        newText = `\`${selectedText}\``;
                        break;
                    case "blockquote":
                        newText = selectedText
                            .split("\n")
                            .map((line) => `> ${line}`)
                            .join("\n");
                        isBlock = true;
                        break;
                    case "lists":
                        const lines = selectedText
                            .split("\n")
                            .filter((line) => line.trim());
                        if (type === "ul")
                            newText = lines
                                .map((line) => `- ${line}`)
                                .join("\n");
                        else if (type === "ol")
                            newText = lines
                                .map((line, i) => `${i + 1}. ${line}`)
                                .join("\n");
                        else if (type === "checklist")
                            newText = lines
                                .map((line) => `- [ ] ${line}`)
                                .join("\n");
                        isBlock = true;
                        break;
                    case "fencedCode":
                        newText = `\`\`\`${type !== "none" ? type : ""}\n${selectedText}\n\`\`\``;
                        isBlock = true;
                        break;
                    case "indentedCode":
                        newText = selectedText
                            .split("\n")
                            .map((line) => `    ${line}`)
                            .join("\n");
                        isBlock = true;
                        break;
                    case "table":
                        insertText = `| Syntax | Description |\n|--------|-------------|\n| Cell   | Data        |`;
                        isBlock = true;
                        break;
                    case "image":
                        const altText = prompt("Enter alt text:", "Alt Text");
                        const imgUrl = prompt(
                            "Enter image URL:",
                            "https://via.placeholder.com/150",
                        );
                        if (altText && imgUrl)
                            newText = `![${altText}](${imgUrl})`;
                        isBlock = true;
                        break;
                    case "hr":
                        insertText = "---";
                        isBlock = true;
                        break;
                }

                if (isBlock) {
                    range.deleteContents();
                    if (newText) {
                        range.insertNode(document.createTextNode(newText));
                    } else if (insertText) {
                        range.insertNode(document.createTextNode(insertText));
                    }
                } else if (newText) {
                    range.deleteContents();
                    range.insertNode(document.createTextNode(newText));
                }

                updatePreview();
                selection.removeAllRanges();
            }

            function getCursorLine(range) {
                const textBefore = editor.innerText.substring(
                    0,
                    range.startOffset,
                );
                return textBefore.split("\n").length - 1;
            }

            async function loadPage(page) {
                try {
                    const response = await fetch(`${serverUrl}/${page}`);
                    const text = await response.text();
                    editor.innerText = text;
                    updatePreview();
                } catch (error) {
                    console.error("Error loading page:", error);
                    editor.innerText = "Error loading page";
                    updatePreview();
                }
            }

            loadPage("index");
        </script>
    </body>
</html>
