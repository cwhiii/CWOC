<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWOC — Unavailable</title>
    <style>
        @font-face {
            font-family: 'Lora';
            src: url('/static/fonts/lora/Lora-VariableFont_wght.ttf') format('truetype');
            font-weight: 400 700;
            font-style: normal;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lora', Georgia, serif;
            background: #f5e6d3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2em;
            color: #1a1208;
        }
        .container {
            background: #fffaf0;
            border: 2px solid #8b5a2b;
            border-radius: 12px;
            padding: 3em 2.5em;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(107, 78, 49, 0.15);
        }
        .icon {
            font-size: 3em;
            margin-bottom: 0.5em;
        }
        h1 {
            font-size: 1.5em;
            color: #6b4e31;
            margin-bottom: 0.5em;
        }
        .server-name {
            font-weight: bold;
            color: #8b5a2b;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #3d2b1f;
            margin-top: 0.5em;
        }
        .hint {
            margin-top: 1.5em;
            font-size: 0.9em;
            color: #6b4e31;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📜</div>
        <h1>CWOC Server Unavailable</h1>
        <p>The CWOC server (<span class="server-name">__HOSTNAME__</span>) is not responding.</p>
        <p class="hint">The service may have stopped or is restarting. Try again in a moment.</p>
    </div>
</body>
</html>
