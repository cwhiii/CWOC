<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/cwod_logo-favicon.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maps View — C.W.'s Omni Chits</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#8b5a2b" />
    <link rel="apple-touch-icon" href="/static/cwoc-icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Shared styles -->
    <link rel="stylesheet" href="/frontend/css/shared/shared-page.css" />
    <link rel="stylesheet" href="/frontend/css/shared/shared-calculator.css" />
    <link rel="stylesheet" href="/frontend/css/dashboard/styles-sidebar.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <style>
        /* ══ Maps Page Inline Styles (page-specific only) ══ */

        /* ── Legend ── */
        .maps-legend {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--aged-brown-dark, #4a2c2a);
        }
        .maps-legend-title {
            font-weight: bold;
            margin-right: 4px;
        }
        .maps-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .maps-legend-swatch {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid #5c4033;
        }
        /* ── Legend outline indicator swatches ── */
        .maps-legend-swatch-outline {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            background: #d2b48c;
        }

        /* ── Status Bar (bottom of map area) ── */
        .maps-status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 12px;
            background: linear-gradient(to bottom, #f5e6cc, #ede0c8);
            border-top: 1px solid #8b5a2b;
            font-size: 12px;
            color: var(--aged-brown-dark, #4a2c2a);
            font-family: 'Lora', Georgia, serif;
            flex-shrink: 0;
            min-height: 28px;
            gap: 12px;
        }
        .maps-status-left {
            display: flex;
            align-items: center;
            flex-shrink: 1;
            min-width: 0;
            overflow: hidden;
        }
        .maps-status-center {
            flex-shrink: 0;
            white-space: nowrap;
        }
        /* ── Loading indicator — settings-page notification style ── */
        #maps-loading-indicator {
            background: #fff8e1;
            border: 1px solid #d4a373;
            border-radius: 4px;
            padding: 2px 10px;
            color: #6b4e31;
            font-style: italic;
            font-size: 12px;
        }
        #maps-loading-text {
            display: inline-block;
            min-width: 70px;
            text-align: left;
        }
        .maps-status-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            font-size: 11px;
            opacity: 0.7;
            white-space: nowrap;
        }
        .maps-status-right a {
            color: var(--aged-brown-dark, #4a2c2a);
            text-decoration: none;
        }
        .maps-status-right a:hover {
            text-decoration: underline;
        }
        .maps-footer-version {
            font-size: 10px;
            opacity: 0.6;
        }
        .maps-people-legend {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--aged-brown-dark, #4a2c2a);
        }

        /* ── Google Maps warning ── */
        .maps-google-warning {
            display: none;
            text-align: center;
            padding: 3em 1em;
            color: var(--aged-brown-dark, #4a2c2a);
            font-size: 1.1em;
        }
        .maps-google-warning .warning-icon {
            font-size: 2em;
            margin-bottom: 0.5em;
        }

        /* ── Contact marker wrapper (remove default Leaflet icon styling) ── */
        .maps-contact-marker-wrapper {
            background: none;
            border: none;
        }

        /* ── Info message (no results) ── */
        .maps-info-message {
            display: none;
            text-align: center;
            padding: 1em;
            color: var(--aged-brown-dark, #4a2c2a);
            font-size: 0.95em;
            opacity: 0.8;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(253, 245, 230, 0.9);
            border-radius: 8px;
            z-index: 500;
        }
    </style>
</head>
<body data-page-title="Maps View" data-page-icon="🗺️">

    <!-- ═══ Google Maps Warning (hidden by default, shown over everything) ═══ -->
    <div class="maps-google-warning" id="maps-google-warning">
        <div class="warning-icon">⚠️</div>
        <p>Google Maps does not support this feature at this time due to billing restrictions.</p>
    </div>

    <!-- ═══ .settings-panel wrapper — triggers shared-page.js header injection ═══ -->
    <div class="settings-panel">

    <!-- ═══ Maps Page Layout (sidebar + main) ═══ -->
    <div class="maps-page-layout" id="maps-page-layout">

        <!-- ── Sidebar ── -->
        <aside id="maps-sidebar" class="maps-sidebar">
            <div class="maps-sidebar-scroll">

                <!-- Chits Filter Panel (shown when mode=chits) -->
                <div id="maps-chits-filter-panel" class="maps-sidebar-panel">

                    <!-- Period Dropdown -->
                    <div class="maps-filter-group">
                        <label>Period</label>
                        <select id="maps-period-filter" class="maps-filter-search">
                            <option value="week" selected>This Week</option>
                            <option value="month">This Month</option>
                            <option value="quarter">This Quarter</option>
                            <option value="year">This Year</option>
                            <option value="all">All Time</option>
                        </select>
                    </div>

                    <!-- Status Checkboxes -->
                    <div class="maps-filter-group">
                        <label>Status</label>
                        <div class="checkbox-list" id="maps-chits-status-list">
                            <label><input type="checkbox" value="ToDo" /> ToDo</label>
                            <label><input type="checkbox" value="In Progress" /> In Progress</label>
                            <label><input type="checkbox" value="Blocked" /> Blocked</label>
                            <label><input type="checkbox" value="Complete" /> Complete</label>
                        </div>
                    </div>

                    <!-- Tag Filter (CwocSidebarFilter container) -->
                    <div class="maps-filter-group">
                        <label>Tags</label>
                        <div id="maps-chits-tags-filter"></div>
                    </div>

                    <!-- Priority Checkboxes -->
                    <div class="maps-filter-group">
                        <label>Priority</label>
                        <div class="checkbox-list" id="maps-chits-priority-list">
                            <label><input type="checkbox" value="Low" /> Low</label>
                            <label><input type="checkbox" value="Medium" /> Medium</label>
                            <label><input type="checkbox" value="High" /> High</label>
                            <label><input type="checkbox" value="Critical" /> Critical</label>
                        </div>
                    </div>

                    <!-- People Filter (CwocSidebarFilter container) -->
                    <div class="maps-filter-group">
                        <label>People</label>
                        <div id="maps-chits-people-filter"></div>
                    </div>

                    <!-- Text Search -->
                    <div class="maps-filter-group">
                        <label>Search</label>
                        <input type="text" class="maps-filter-search" id="maps-chits-text-search" placeholder="Search chits…" />
                    </div>

                    <!-- Clear Filters -->
                    <button class="maps-clear-filters-btn" id="maps-chits-clear-filters">Clear Filters</button>

                </div>

                <!-- People Filter Panel (hidden by default — Chits mode is default) -->
                <div id="maps-people-filter-panel" class="maps-sidebar-panel" style="display:none">

                    <!-- Text Search -->
                    <div class="maps-filter-group">
                        <label>Search</label>
                        <input type="text" class="maps-filter-search" id="maps-people-text-search" placeholder="Search contacts…" />
                    </div>

                    <!-- Favorites Toggle -->
                    <div class="maps-filter-group">
                        <button class="maps-favorites-toggle" id="maps-people-favorites-toggle">
                            <i class="fa-solid fa-star"></i> Favorites Only
                        </button>
                    </div>

                    <!-- Tag Filter (CwocSidebarFilter container) -->
                    <div class="maps-filter-group">
                        <label>Tags</label>
                        <div id="maps-people-tags-filter"></div>
                    </div>

                    <!-- Clear Filters -->
                    <button class="maps-clear-filters-btn" id="maps-people-clear-filters">Clear Filters</button>

                </div>

            </div><!-- /.maps-sidebar-scroll -->
        </aside>

        <!-- ── Main Map Area ── -->
        <main class="maps-main">
            <div id="maps-container"></div>

            <!-- Info Message (no results — overlaid on map) -->
            <div class="maps-info-message" id="maps-info-message">
                No chits with locations found for the selected period.
            </div>

            <!-- ── Status Bar (legend left, loading center, page title right) ── -->
            <div class="maps-status-bar" id="maps-status-bar">
                <!-- Left: Legends -->
                <div class="maps-status-left">
                    <!-- Chits Legend (chit color + blocked/overdue indicators) -->
                    <div class="maps-legend" id="maps-legend">
                        <span class="maps-legend-title">Chits:</span>
                        <span class="maps-legend-item"><span class="maps-legend-swatch" style="background:#d2b48c;border-radius:3px;"></span> Chit color</span>
                        <span class="maps-legend-item"><span class="maps-legend-swatch-outline" style="border:2px solid #F44336;border-radius:3px;"></span> Blocked</span>
                        <span class="maps-legend-item"><span class="maps-legend-swatch-outline" style="border:2px solid #FF9800;border-radius:3px;"></span> Overdue</span>
                    </div>
                    <!-- People Legend (hidden by default) -->
                    <div class="maps-people-legend" id="maps-people-legend" style="display:none">
                        <span class="maps-legend-title">Contacts:</span>
                        <span class="maps-legend-item">
                            <span class="maps-legend-swatch" style="background:#008080; border-radius:50%;"></span> Contact color
                        </span>
                    </div>
                </div>
                <!-- Center: Loading indicator -->
                <div class="maps-status-center" id="maps-loading-indicator" style="display:none;">
                    <span id="maps-loading-text">Loading.</span>
                </div>
                <!-- Right: Page title / copyright -->
                <div class="maps-status-right">
                    <span class="maps-footer-copyright" id="maps-footer-copyright">&copy; 2026 <a href="https://www.cwholemaniii.com/pages/home.shtml" target="_blank">C.W.'s Omni Chits</a></span>
                    <span class="maps-footer-version" id="maps-footer-version"></span>
                </div>
            </div>
        </main>

    </div><!-- /.maps-page-layout -->

    </div><!-- /.settings-panel -->

    <!-- ── Leaflet JS ── -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- ── Leaflet MarkerCluster JS ── -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- ── 1. Shared sub-scripts (utils first, coordinator last) ─────────── -->
    <script src="/frontend/js/shared/shared-auth.js"></script>
    <script src="/frontend/js/shared/shared-utils.js"></script>
    <script src="/frontend/js/shared/shared-touch.js"></script>
    <script src="/frontend/js/shared/shared-checklist.js"></script>
    <script src="/frontend/js/shared/shared-sort.js"></script>
    <script src="/frontend/js/shared/shared-indicators.js"></script>
    <script src="/frontend/js/shared/shared-calendar.js"></script>
    <script src="/frontend/js/shared/shared-tags.js"></script>
    <script src="/frontend/js/shared/shared-recurrence.js"></script>
    <script src="/frontend/js/shared/shared-geocoding.js"></script>
    <script src="/frontend/js/shared/shared-qr.js"></script>
    <script src="/frontend/js/shared/shared.js"></script>
    <script src="/frontend/js/shared/shared-calculator.js"></script>

    <!-- ── 2. Shared page components ─────────────────────────────────────── -->
    <script src="/frontend/js/shared/shared-sidebar-filter.js"></script>
    <script src="/frontend/js/pages/shared-page.js"></script>

    <!-- ── 3. Page-specific script ───────────────────────────────────────── -->
    <script src="/frontend/js/pages/maps.js"></script>

    <!-- ── PWA ───────────────────────────────────────────────────────────── -->
    <script src="/pwa/pwa-register.js"></script>
</body>
</html>
