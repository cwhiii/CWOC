    ═══════════════════════════════════════════════════════════════════════════
    CWOC Page Template
    ═══════════════════════════════════════════════════════════════════════════

    data-page-title and data-page-icon trigger auto header/footer injection
    via shared-page.js. The injection creates:
      .settings-panel > .header-and-buttons (logo + title + nav buttons)
    and appends .author-info footer after .settings-panel.

    Optional body attributes:
      data-hide-nav="audit-log,trash"   — hide specific nav buttons
      data-show-nav="trash,people"      — show normally-hidden nav buttons

    ═══════════════════════════════════════════════════════════════════════════
    REQUIRED SCRIPT LOAD ORDER (at end of <body>):

    1. Shared sub-scripts (order matters — utils first, coordinator last):
         shared-utils.js → shared-touch.js → shared-checklist.js →
         shared-sort.js → shared-indicators.js → shared-calendar.js →
         shared-tags.js → shared-recurrence.js → shared-geocoding.js →
         shared-qr.js → shared.js

    2. Shared page components:
         shared-page.js

    3. (Optional) Shared editor — only if page uses editor zones:
         shared-editor.js

    4. Page-specific script(s):
         your-page.js

    See src/INDEX.md § 4 "Load Order" for the full reference.
    ═══════════════════════════════════════════════════════════════════════════
-->
