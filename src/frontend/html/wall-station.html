<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/cwod_logo-favicon.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wall Station — C.W.'s Omni Chits</title>
    <link rel="stylesheet" href="/frontend/css/shared/shared-page.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <style>
        /* ══ Wall Station Page Styles ══ */

        /* ── Override body for wall display ── */
        body {
            padding: 0.5em;
        }

        /* ── Two-column layout ── */
        .wall-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 12px;
        }

        /* ── Section headers ── */
        .wall-section-header {
            font-size: 20px;
            font-weight: 700;
            color: #4a2c2a;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid rgba(139, 90, 43, 0.4);
            padding-bottom: 6px;
            margin: 0 0 12px 0;
            text-align: left;
        }

        /* ── Calendar section ── */
        .wall-calendar-section {
            min-width: 0;
        }

        .wall-day-group {
            margin-bottom: 16px;
        }
        .wall-day-label {
            font-size: 16px;
            font-weight: 700;
            color: #1a1208;
            margin-bottom: 6px;
            padding: 4px 8px;
            background: rgba(139, 90, 43, 0.1);
            border-radius: 4px;
        }
        .wall-day-label.today {
            background: rgba(212, 175, 55, 0.2);
            border-left: 3px solid #d4af37;
        }

        .wall-event {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 10px;
            margin-bottom: 4px;
            border-radius: 4px;
            background: #fff8e1;
            border: 1px solid rgba(139, 90, 43, 0.2);
        }
        .wall-event-time {
            font-size: 14px;
            font-weight: 600;
            color: #8b4513;
            white-space: nowrap;
            min-width: 60px;
        }
        .wall-event-title {
            font-size: 15px;
            color: #1a1208;
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }
        .wall-event-owner {
            font-size: 13px;
            color: #8b5a2b;
            white-space: nowrap;
        }

        /* ── Task section ── */
        .wall-task-section {
            min-width: 0;
        }

        .wall-task {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 6px 10px;
            margin-bottom: 4px;
            border-radius: 4px;
            background: #fff8e1;
            border: 1px solid rgba(139, 90, 43, 0.2);
        }
        .wall-task-status {
            font-size: 14px;
            flex-shrink: 0;
        }
        .wall-task-title {
            font-size: 15px;
            color: #1a1208;
            flex: 1;
            min-width: 0;
            word-break: break-word;
        }
        .wall-task-owner {
            font-size: 13px;
            color: #8b5a2b;
            white-space: nowrap;
        }
        .wall-task-due {
            font-size: 13px;
            color: #a0522d;
            white-space: nowrap;
        }

        /* ── Status icons ── */
        .status-todo { color: #8b4513; }
        .status-inprogress { color: #d4af37; }
        .status-blocked { color: #b22222; }
        .status-complete { color: #2e7d32; }

        /* ── Empty / error / loading states ── */
        .wall-empty {
            text-align: center;
            padding: 2em;
            color: #4a2c2a;
            opacity: 0.7;
            font-size: 1.05em;
        }
        .wall-error {
            text-align: center;
            padding: 2em;
            color: #b22222;
            font-size: 1.05em;
        }
        .wall-loading {
            text-align: center;
            padding: 2em;
            color: #4a2c2a;
            opacity: 0.7;
        }

        /* ── User legend ── */
        .wall-user-legend {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            padding: 6px 10px;
            background: rgba(139, 90, 43, 0.06);
            border-radius: 4px;
        }
        .wall-user-chip {
            font-size: 14px;
            color: #4a2c2a;
            font-weight: 600;
        }

        /* ── Last updated ── */
        .wall-last-updated {
            font-size: 12px;
            color: #8b7355;
            text-align: right;
            margin-top: 8px;
        }

        /* ── Responsive: single column on narrow screens ── */
        @media (max-width: 768px) {
            .wall-columns {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 480px) {
            body { padding: 0.25em; }
            .wall-section-header { font-size: 17px; }
            .wall-event, .wall-task { padding: 5px 8px; }
        }
    </style>
</head>
<!-- No data-page-title: wall station does NOT use shared-page.js header injection -->
<body>

    <div class="settings-panel">
        <div class="header-and-buttons">
            <h2>
                <a href="/" title="Go to Dashboard" style="display:inline-block;vertical-align:middle;"><img src="/static/cwod_logo.png" alt="Logo" /></a>
                📺 Wall Station
            </h2>
        </div>

        <div id="wall-user-legend" class="wall-user-legend" style="display:none;"></div>

        <div id="wall-content">
            <div class="wall-loading">
                <div class="loader"></div>
                Loading wall station…
            </div>
        </div>

        <div id="wall-last-updated" class="wall-last-updated"></div>
    </div>

    <div class="author-info">
        &copy; 2026 <a href="https://www.cwholemaniii.com/pages/home.shtml" target="_blank">C.W.'s Omni Chits</a>
        &middot; <span id="cwoc-footer-version"></span>
    </div>

    <!-- No shared-auth.js — wall station is unauthenticated -->
    <!-- No shared-page.js — no header injection or nav needed -->

    <script>
    /* ═══════════════════════════════════════════════════════════════════════
       Wall Station — standalone unauthenticated page
       Reads `users` query parameter, fetches /api/wall-station, renders
       a combined calendar + task view with owner attribution.
       Auto-refreshes every 60 seconds.
       ═══════════════════════════════════════════════════════════════════════ */
    (function() {
        'use strict';

        var REFRESH_INTERVAL_MS = 60000; // 60 seconds
        var _refreshTimer = null;
        var _userDisplayNames = {}; // id → display_name lookup

        /* ── Read user identifiers from query string (usernames or UUIDs) ── */
        function _getUserIds() {
            var params = new URLSearchParams(window.location.search);
            var raw = params.get('users') || '';
            return raw.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
        }

        /* ── HTML escaping ───────────────────────────────────────────────── */
        function _esc(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str || ''));
            return div.innerHTML;
        }

        /* ── Date formatting helpers ─────────────────────────────────────── */
        function _formatDate(dateStr) {
            if (!dateStr) return '';
            var d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                          'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
        }

        function _formatTime(dateStr) {
            if (!dateStr) return '';
            var d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            var h = d.getHours();
            var m = d.getMinutes();
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
        }

        function _dateKey(dateStr) {
            if (!dateStr) return '';
            var d = new Date(dateStr);
            if (isNaN(d.getTime())) return '';
            return d.getFullYear() + '-' +
                   String(d.getMonth() + 1).padStart(2, '0') + '-' +
                   String(d.getDate()).padStart(2, '0');
        }

        function _todayKey() {
            var d = new Date();
            return d.getFullYear() + '-' +
                   String(d.getMonth() + 1).padStart(2, '0') + '-' +
                   String(d.getDate()).padStart(2, '0');
        }

        function _isToday(key) {
            return key === _todayKey();
        }

        function _isFuture(key) {
            return key >= _todayKey();
        }

        /* ── Owner display name lookup ───────────────────────────────────── */
        function _ownerName(chit) {
            if (chit.owner_display_name) return chit.owner_display_name;
            if (chit.owner_id && _userDisplayNames[chit.owner_id]) {
                return _userDisplayNames[chit.owner_id];
            }
            return '';
        }

        /* ── Status icon for tasks ───────────────────────────────────────── */
        function _statusIcon(status) {
            switch ((status || '').toLowerCase()) {
                case 'todo':        return '<i class="fa-regular fa-circle status-todo" title="To Do"></i>';
                case 'in progress': return '<i class="fa-solid fa-spinner status-inprogress" title="In Progress"></i>';
                case 'blocked':     return '<i class="fa-solid fa-ban status-blocked" title="Blocked"></i>';
                case 'complete':    return '<i class="fa-solid fa-circle-check status-complete" title="Complete"></i>';
                default:            return '<i class="fa-regular fa-circle status-todo" title="Task"></i>';
            }
        }

        /* ── Determine the primary date for a chit ───────────────────────── */
        function _chitDate(chit) {
            return chit.start_datetime || chit.due_datetime || chit.end_datetime || '';
        }

        /* ── Check if a chit is a calendar event (has a date) ────────────── */
        function _isCalendarEvent(chit) {
            return !!(chit.start_datetime || chit.due_datetime || chit.end_datetime);
        }

        /* ── Check if a chit is a task ───────────────────────────────────── */
        function _isTask(chit) {
            var s = (chit.status || '').toLowerCase();
            return s === 'todo' || s === 'in progress' || s === 'blocked' || s === 'complete';
        }

        /* ── Render calendar events ──────────────────────────────────────── */
        function _renderCalendar(chits) {
            var events = chits.filter(_isCalendarEvent);

            // Group by date
            var groups = {};
            events.forEach(function(chit) {
                var key = _dateKey(_chitDate(chit));
                if (!key) return;
                if (!groups[key]) groups[key] = [];
                groups[key].push(chit);
            });

            // Sort date keys, filter to today and future, limit to 14 days
            var today = _todayKey();
            var keys = Object.keys(groups).sort();
            keys = keys.filter(function(k) { return k >= today; });
            keys = keys.slice(0, 14);

            if (keys.length === 0) {
                return '<div class="wall-empty"><i class="fa-regular fa-calendar"></i> No upcoming events</div>';
            }

            var html = '';
            keys.forEach(function(key) {
                var isT = _isToday(key);
                var label = isT ? '📌 Today — ' + _formatDate(key + 'T00:00:00') : _formatDate(key + 'T00:00:00');
                html += '<div class="wall-day-group">';
                html += '<div class="wall-day-label' + (isT ? ' today' : '') + '">' + _esc(label) + '</div>';

                // Sort events by time within the day
                var dayEvents = groups[key].slice().sort(function(a, b) {
                    var ta = _chitDate(a) || '';
                    var tb = _chitDate(b) || '';
                    return ta.localeCompare(tb);
                });

                dayEvents.forEach(function(chit) {
                    var time = _formatTime(_chitDate(chit));
                    var owner = _ownerName(chit);
                    html += '<div class="wall-event">';
                    html += '<span class="wall-event-time">' + (time ? _esc(time) : '<i class="fa-regular fa-clock"></i>') + '</span>';
                    html += '<span class="wall-event-title">' + _esc(chit.title || 'Untitled') + '</span>';
                    if (owner) {
                        html += '<span class="wall-event-owner">👤 ' + _esc(owner) + '</span>';
                    }
                    html += '</div>';
                });

                html += '</div>';
            });

            return html;
        }

        /* ── Render task list ────────────────────────────────────────────── */
        function _renderTasks(chits) {
            var tasks = chits.filter(function(c) {
                return _isTask(c) && (c.status || '').toLowerCase() !== 'complete';
            });

            // Sort: In Progress first, then Blocked, then ToDo; within each group by due date
            var order = { 'in progress': 0, 'blocked': 1, 'todo': 2 };
            tasks.sort(function(a, b) {
                var oa = order[(a.status || '').toLowerCase()] || 2;
                var ob = order[(b.status || '').toLowerCase()] || 2;
                if (oa !== ob) return oa - ob;
                var da = a.due_datetime || '';
                var db = b.due_datetime || '';
                return da.localeCompare(db);
            });

            if (tasks.length === 0) {
                return '<div class="wall-empty"><i class="fa-solid fa-clipboard-check"></i> No active tasks</div>';
            }

            var html = '';
            tasks.forEach(function(chit) {
                var owner = _ownerName(chit);
                var due = chit.due_datetime ? _formatDate(chit.due_datetime) : '';
                html += '<div class="wall-task">';
                html += '<span class="wall-task-status">' + _statusIcon(chit.status) + '</span>';
                html += '<span class="wall-task-title">' + _esc(chit.title || 'Untitled') + '</span>';
                if (due) {
                    html += '<span class="wall-task-due"><i class="fa-regular fa-calendar"></i> ' + _esc(due) + '</span>';
                }
                if (owner) {
                    html += '<span class="wall-task-owner">👤 ' + _esc(owner) + '</span>';
                }
                html += '</div>';
            });

            return html;
        }

        /* ── Render user legend ──────────────────────────────────────────── */
        function _renderUserLegend(users) {
            var legendEl = document.getElementById('wall-user-legend');
            if (!users || users.length === 0) {
                legendEl.style.display = 'none';
                return;
            }
            legendEl.style.display = '';
            legendEl.innerHTML = users.map(function(u) {
                return '<span class="wall-user-chip">👤 ' + _esc(u.display_name || u.id) + '</span>';
            }).join('');
        }

        /* ── Main fetch and render ───────────────────────────────────────── */
        function _fetchAndRender() {
            var userIds = _getUserIds();
            var contentEl = document.getElementById('wall-content');
            var updatedEl = document.getElementById('wall-last-updated');

            if (userIds.length === 0) {
                contentEl.innerHTML = '<div class="wall-error">' +
                    '<i class="fa-solid fa-triangle-exclamation"></i> ' +
                    'No users specified. Add <code>?users=username1,username2</code> to the URL.' +
                    '</div>';
                return;
            }

            var url = '/api/wall-station?user_ids=' + encodeURIComponent(userIds.join(','));

            fetch(url)
                .then(function(r) {
                    if (!r.ok) {
                        return r.json().then(function(data) {
                            throw new Error(data.detail || 'Failed to load data');
                        }).catch(function(e) {
                            if (e.message) throw e;
                            throw new Error('Failed to load data (HTTP ' + r.status + ')');
                        });
                    }
                    return r.json();
                })
                .then(function(data) {
                    var chits = data.chits || [];
                    var users = data.users || [];

                    // Build display name lookup
                    _userDisplayNames = {};
                    users.forEach(function(u) {
                        _userDisplayNames[u.id] = u.display_name || '';
                    });

                    // Backfill owner_display_name from lookup if missing
                    chits.forEach(function(chit) {
                        if (!chit.owner_display_name && chit.owner_id && _userDisplayNames[chit.owner_id]) {
                            chit.owner_display_name = _userDisplayNames[chit.owner_id];
                        }
                    });

                    _renderUserLegend(users);

                    var calendarHtml = _renderCalendar(chits);
                    var tasksHtml = _renderTasks(chits);

                    contentEl.innerHTML =
                        '<div class="wall-columns">' +
                            '<div class="wall-calendar-section">' +
                                '<div class="wall-section-header"><i class="fa-regular fa-calendar"></i> Calendar</div>' +
                                calendarHtml +
                            '</div>' +
                            '<div class="wall-task-section">' +
                                '<div class="wall-section-header"><i class="fa-solid fa-list-check"></i> Tasks</div>' +
                                tasksHtml +
                            '</div>' +
                        '</div>';

                    // Update timestamp
                    var now = new Date();
                    updatedEl.textContent = 'Last updated: ' + now.toLocaleTimeString();
                })
                .catch(function(err) {
                    console.error('Wall station fetch error:', err);
                    contentEl.innerHTML = '<div class="wall-error">' +
                        '<i class="fa-solid fa-triangle-exclamation"></i> ' +
                        'Unable to load data. Will retry automatically.' +
                        '</div>';
                });
        }

        /* ── Initialize ──────────────────────────────────────────────────── */
        function _init() {
            // Fetch version for footer
            fetch('/api/version')
                .then(function(r) { return r.ok ? r.json() : {}; })
                .then(function(d) {
                    var el = document.getElementById('cwoc-footer-version');
                    if (el && d.version) el.textContent = 'v' + d.version;
                })
                .catch(function() {});

            // Initial fetch
            _fetchAndRender();

            // Auto-refresh every 60 seconds
            _refreshTimer = setInterval(_fetchAndRender, REFRESH_INTERVAL_MS);
        }

        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', _init);
        } else {
            _init();
        }
    })();
    </script>
</body>
</html>
