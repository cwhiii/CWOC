<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/cwod_logo-favicon.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audit Log — C.W.'s Omni Chits</title>
    <link rel="stylesheet" href="/frontend/css/shared/shared-page.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        /* ══ AUDIT LOG PAGE-SPECIFIC STYLES ══ */

        /* ── Layout: sidebar + main ── */
        .audit-layout {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        /* ── Sidebar ── */
        .audit-sidebar {
            width: 230px;
            min-width: 200px;
            flex-shrink: 0;
            background: linear-gradient(to bottom, #f5e6cc, #ede0c8);
            border: 1px solid #8b5a2b;
            border-radius: 6px;
            padding: 14px;
            box-sizing: border-box;
        }
        .audit-sidebar h3 {
            font-size: 15px;
            margin: 0 0 8px 0;
            padding: 0 0 4px 0;
            border-bottom: 1px solid #c4a484;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
            color: var(--aged-brown-dark);
        }
        .audit-sidebar label {
            display: block;
            font-size: 13px;
            margin: 10px 0 4px 0;
            color: var(--aged-brown-dark);
            font-weight: bold;
        }
        .audit-sidebar select,
        .audit-sidebar input[type="date"] {
            width: 100%;
            box-sizing: border-box;
            font-size: 13px;
            padding: 5px 6px;
        }
        .audit-sidebar .filter-radios {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 4px;
        }
        .audit-sidebar .filter-radios label {
            font-weight: normal;
            font-size: 13px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .audit-sidebar .filter-radios input[type="radio"] {
            accent-color: #8b5a2b;
            cursor: pointer;
        }

        /* ── Main content area ── */
        .audit-main {
            flex: 1;
            min-width: 0;
        }

        /* ── Toolbar ── */
        .audit-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .audit-toolbar .toolbar-spacer { flex: 1; }

        /* ── Sortable table headers ── */
        .cwoc-table th.sortable {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .cwoc-table th.sortable:hover {
            background: #d4c5a9;
        }
        .sort-arrow {
            font-size: 0.75em;
            margin-left: 4px;
            opacity: 0.4;
        }
        .sort-arrow.active {
            opacity: 1;
            color: var(--aged-brown-dark);
        }

        /* ── Expandable detail row ── */
        .detail-toggle {
            cursor: pointer;
            color: var(--aged-brown-medium);
            font-size: 0.9em;
            user-select: none;
        }
        .detail-toggle:hover { color: var(--aged-brown-dark); }
        .audit-detail-row td {
            padding: 4px 10px 10px 10px;
            background: #fdf5e6;
            border-bottom: 2px solid #d4c5a9;
        }
        .audit-changes-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
            margin-top: 4px;
        }
        .audit-changes-table th {
            background: #e8dcc8;
            padding: 4px 8px;
            text-align: left;
            font-size: 0.85em;
            border-bottom: 1px solid #c4a484;
        }
        .audit-changes-table td {
            padding: 3px 8px;
            border-bottom: 1px solid #e0d4b5;
            word-break: break-word;
            max-width: 250px;
        }
        .change-old { color: #b22222; }
        .change-new { color: #2e7d32; }

        /* ── Load More ── */
        .load-more-wrap {
            text-align: center;
            margin-top: 14px;
        }
        .load-more-wrap .cwoc-btn {
            font-size: 14px;
            height: auto;
            padding: 8px 20px;
        }
        .audit-total {
            font-size: 0.85em;
            opacity: 0.7;
            margin-top: 6px;
        }

        /* ── Action badge colors ── */
        .action-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .action-badge.created { background: #c8e6c9; color: #2e7d32; }
        .action-badge.updated { background: #fff3cd; color: #856404; }
        .action-badge.deleted { background: #f8d7da; color: #b22222; }

        /* ── Entity link ── */
        .entity-link {
            color: #5c4033;
            text-decoration: underline;
            cursor: pointer;
        }
        .entity-link:hover { color: #8b4513; }

        /* ── Delete modal ── */
        .nuke-count { font-size: 1.1em; font-weight: bold; margin: 8px 0; }
        .nuke-warning { font-size: 0.8em; opacity: 0.7; margin-top: 6px; }

        /* ── Mobile responsive ── */
        @media (max-width: 768px) {
            .audit-layout {
                flex-direction: column;
            }

            /* ── Sidebar: slide-in from left ── */
            .audit-sidebar {
                position: fixed;
                top: 0;
                left: -270px;
                width: 250px;
                height: 100%;
                min-width: 0;
                z-index: 2001;
                border-radius: 0;
                border: none;
                border-right: 2px solid #8b5a2b;
                transition: left 0.25s ease;
                overflow-y: auto;
                box-shadow: 4px 0 16px rgba(0, 0, 0, 0.2);
            }
            .audit-sidebar.active {
                left: 0;
            }
            .audit-filter-backdrop {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.4);
                z-index: 2000;
            }
            .audit-filter-backdrop.active {
                display: block;
            }

            /* ── Toolbar ── */
            .audit-toolbar {
                gap: 6px;
            }
            .audit-toolbar .toolbar-spacer { flex: 0; }

            /* ── Table: compact card layout ── */
            #audit-table-wrap {
                overflow-x: hidden;
            }
            .cwoc-table {
                border-collapse: separate;
                border-spacing: 0;
            }
            .cwoc-table thead {
                display: none;
            }
            .cwoc-table tbody {
                display: block;
            }
            .cwoc-table tr {
                display: flex;
                flex-wrap: wrap;
                align-items: baseline;
                gap: 0 8px;
                border: 1px solid #d4c5a9;
                border-radius: 4px;
                margin-bottom: 4px;
                padding: 5px 8px;
                background: rgba(253, 245, 230, 0.5);
            }
            .cwoc-table td {
                display: inline;
                padding: 0;
                border: none;
                font-size: 0.88em;
                line-height: 1.5;
            }
            /* Hide the data-label pseudo-elements — use inline flow instead */
            .cwoc-table td:before {
                display: none;
            }
            /* Detail toggle: inline at start */
            .cwoc-table td:first-child {
                margin-right: 4px;
            }

            /* Detail row */
            .audit-detail-row {
                border: none !important;
                margin-top: -4px;
                margin-bottom: 4px;
                padding: 0 !important;
            }
            .audit-detail-row td {
                display: block;
                width: 100%;
                padding: 4px 8px 6px;
                font-size: 0.85em;
            }

            /* Changes sub-table: tighter */
            .audit-changes-table td {
                max-width: none;
                font-size: 0.82em;
                padding: 2px 4px;
            }
        }

        /* Extra small screens */
        @media (max-width: 480px) {
            .audit-sidebar {
                width: 220px;
                left: -230px;
                padding: 10px;
            }
            .audit-sidebar label {
                font-size: 12px;
                margin: 6px 0 2px 0;
            }
            .audit-sidebar select,
            .audit-sidebar input[type="date"] {
                font-size: 12px;
            }

            /* Changes sub-table: stack into rows */
            .audit-changes-table,
            .audit-changes-table thead,
            .audit-changes-table tbody,
            .audit-changes-table tr,
            .audit-changes-table td,
            .audit-changes-table th {
                display: block;
                width: 100%;
            }
            .audit-changes-table thead { display: none; }
            .audit-changes-table tr {
                border-bottom: 1px solid #d4c5a9;
                padding: 3px 0;
                margin-bottom: 3px;
            }
            .audit-changes-table td {
                max-width: none;
                padding: 1px 4px;
            }
            .audit-changes-table td:first-child {
                font-weight: bold;
                font-size: 0.85em;
                color: var(--aged-brown-dark);
            }
            .audit-changes-table td.change-old:before {
                content: "Old: ";
                font-weight: bold;
                font-size: 0.85em;
            }
            .audit-changes-table td.change-new:before {
                content: "New: ";
                font-weight: bold;
                font-size: 0.85em;
            }
        }

        /* ── Drag-and-drop column reorder ── */
        .dragging { opacity: 0.5; }
        .drag-over { border-left: 2px solid #8b5a2b; }
    </style>
</head>
<body data-page-title="Audit Log" data-page-icon="📋">

    <div class="settings-panel">
        <div class="audit-layout">
            <!-- ═══ SIDEBAR: Filters ═══ -->
            <div class="audit-sidebar">
                <h3><i class="fas fa-filter"></i> Filters</h3>

                <label>Entity Type</label>
                <div class="filter-radios" id="entity-type-radios">
                    <label><input type="radio" name="entity_type" value="" checked onchange="applyFilters()" /> All</label>
                    <label><input type="radio" name="entity_type" value="chit" onchange="applyFilters()" /> Chits</label>
                    <label><input type="radio" name="entity_type" value="contact" onchange="applyFilters()" /> Contacts</label>
                    <label><input type="radio" name="entity_type" value="independent_alert" onchange="applyFilters()" /> Ind. Alerts</label>
                    <label><input type="radio" name="entity_type" value="settings" onchange="applyFilters()" /> Settings</label>
                    <label><input type="radio" name="entity_type" value="system" onchange="applyFilters()" /> System</label>
                </div>

                <label for="filter-sort">Sort By</label>
                <select id="filter-sort" onchange="_onSortDropdownChange()">
                    <option value="timestamp-desc">Time ▼</option>
                    <option value="timestamp-asc">Time ▲</option>
                    <option value="entity_summary-desc">Entity ▼</option>
                    <option value="entity_summary-asc">Entity ▲</option>
                    <option value="actor-desc">Actor ▼</option>
                    <option value="actor-asc">Actor ▲</option>
                    <option value="action-desc">Action ▼</option>
                    <option value="action-asc">Action ▲</option>
                    <option value="entity_type-desc">Type ▼</option>
                    <option value="entity_type-asc">Type ▲</option>
                </select>

                <label for="filter-actor">Actor</label>
                <select id="filter-actor" onchange="applyFilters()">
                    <option value="">All Actors</option>
                </select>

                <label for="filter-since">Start</label>
                <input type="date" id="filter-since" onchange="applyFilters()" />

                <label for="filter-until">End</label>
                <input type="date" id="filter-until" onchange="applyFilters()" />

                <label for="filter-page-size">Page Size</label>
                <select id="filter-page-size" onchange="applyFilters()">
                    <option value="25">25</option>
                    <option value="50" selected>50</option>
                    <option value="100">100</option>
                    <option value="500">500</option>
                </select>
            </div>

            <!-- ═══ MAIN CONTENT ═══ -->
            <div class="audit-main">
                <!-- Toolbar -->
                <div class="audit-toolbar">
                    <button class="cwoc-btn" id="audit-filter-toggle-btn" onclick="_toggleAuditFilters()" style="display:none;" title="Show/hide filters"><i class="fas fa-filter"></i> Filters</button>
                    <button class="cwoc-btn" onclick="downloadCSV()" title="Download CSV export"><i class="fas fa-download"></i> CSV</button>
                    <div class="toolbar-spacer"></div>
                    <button class="cwoc-btn danger" onclick="openDeleteModal()" title="Delete audit logs">🗑️ Delete</button>
                </div>

                <!-- Table -->
                <div id="audit-table-wrap"></div>

                <!-- Load More + total -->
                <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
                    <button class="cwoc-btn" onclick="loadMore()"><i class="fas fa-chevron-down"></i> Load More</button>
                    <div class="audit-total" id="audit-total"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══ DELETE AUDIT LOGS MODAL ═══ -->
    <div class="modal" id="delete-modal">
        <div class="modal-content">
            <h3>🗑️ Delete Audit Logs</h3>
            <label for="prune-select" style="font-weight:bold;margin-bottom:4px;display:block;">Prune older than:</label>
            <select id="prune-select" onchange="onPruneSelectChange()" style="width:100%;margin-bottom:10px;">
                <option value="">Select...</option>
            </select>
            <div class="nuke-count" id="prune-count-display" style="display:none;"></div>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:10px;">
                <input type="checkbox" id="download-first-cb" checked /> 📥 Download first?
            </label>
            <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;">
                <button class="standard-button" onclick="closeDeleteModal()">Cancel</button>
                <button class="cwoc-btn danger" id="nuke-btn" onclick="confirmNuke()" disabled>☢️ NUKE AUDIT LOGS</button>
            </div>
            <p class="nuke-warning">There is no undo for this action.</p>
        </div>
    </div>

    <!-- ═══ FINAL NUKE CONFIRMATION MODAL ═══ -->
    <div class="modal" id="nuke-confirm-modal">
        <div class="modal-content" style="text-align:center;">
            <h3 style="color:#b22222;">☢️ Are you sure?</h3>
            <p id="nuke-confirm-msg" style="font-weight:bold;"></p>
            <p style="font-size:0.85em;opacity:0.7;">This cannot be undone.</p>
            <div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">
                <button class="standard-button" onclick="closeNukeConfirm()">Cancel</button>
                <button class="cwoc-btn danger" onclick="executeDelete()">☢️ NUKE THEM</button>
            </div>
        </div>
    </div>

    <script src="/frontend/js/shared/shared-utils.js"></script>
    <script src="/frontend/js/shared/shared-touch.js"></script>
    <script src="/frontend/js/shared/shared-checklist.js"></script>
    <script src="/frontend/js/shared/shared-sort.js"></script>
    <script src="/frontend/js/shared/shared-indicators.js"></script>
    <script src="/frontend/js/shared/shared-calendar.js"></script>
    <script src="/frontend/js/shared/shared-tags.js"></script>
    <script src="/frontend/js/shared/shared-recurrence.js"></script>
    <script src="/frontend/js/shared/shared-geocoding.js"></script>
    <script src="/frontend/js/shared/shared-qr.js"></script>
    <script src="/frontend/js/shared/shared.js"></script>
    <script src="/frontend/js/pages/shared-page.js"></script>
    <script>
    /* ═══════════════════════════════════════════════════════════════════════
       Audit Log Page — inline JS
       ═══════════════════════════════════════════════════════════════════════ */

    // ── State ──
    let auditEntries = [];
    let auditTotal = 0;
    let currentOffset = 0;
    let sortBy = 'timestamp';
    let sortOrder = 'desc';
    let pruneCount = 0;

    // ── Column order (mutable for drag reorder) ──
    let columns = [
        { key: 'timestamp',      label: 'Time' },
        { key: 'entity_summary', label: 'Entity' },
        { key: 'actor',          label: 'Actor' },
        { key: 'action',         label: 'Action' },
        { key: 'entity_type',    label: 'Entity Type' },
    ];
    let _dragColIdx = null;

    // ── Helpers ──
    function getEntityType() {
        const checked = document.querySelector('input[name="entity_type"]:checked');
        return checked ? checked.value : '';
    }
    function getActor()    { return document.getElementById('filter-actor').value; }
    function getSince()    { return document.getElementById('filter-since').value; }
    function getUntil()    { return document.getElementById('filter-until').value; }
    function getPageSize() { return parseInt(document.getElementById('filter-page-size').value, 10); }

    function buildQueryParams(offset, limit) {
        const params = new URLSearchParams();
        const et = getEntityType();
        const actor = getActor();
        const since = getSince();
        const until = getUntil();
        if (et)    params.set('entity_type', et);
        if (actor) params.set('actor', actor);
        if (since) params.set('since', since + 'T00:00:00');
        if (until) params.set('until', until + 'T23:59:59');
        params.set('limit', limit);
        params.set('offset', offset);
        params.set('sort_by', sortBy);
        params.set('sort_order', sortOrder);
        return params.toString();
    }

    // ── Fetch entries ──
    async function fetchEntries(offset, limit) {
        try {
            const qs = buildQueryParams(offset, limit);
            const resp = await fetch('/api/audit-log?' + qs);
            if (!resp.ok) throw new Error('Failed to fetch audit log');
            return await resp.json();
        } catch (e) {
            console.error('Audit log fetch error:', e);
            return { entries: [], total: 0 };
        }
    }

    // ── Populate actor dropdown from existing entries + current username ──
    async function populateActors() {
        try {
            const resp = await fetch('/api/audit-log?limit=1000&offset=0');
            const actors = new Set();
            actors.add('Unknown Gremlin');
            if (resp.ok) {
                const data = await resp.json();
                data.entries.forEach(e => { if (e.actor) actors.add(e.actor); });
            }
            // Also fetch current username from settings
            try {
                const settingsResp = await fetch('/api/settings/default_user');
                if (settingsResp.ok) {
                    const settings = await settingsResp.json();
                    if (settings.username) actors.add(settings.username);
                }
            } catch (e) { /* ignore */ }

            const sorted = [...actors].sort();
            const sel = document.getElementById('filter-actor');
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">All Actors</option>';
            sorted.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a;
                opt.textContent = a;
                sel.appendChild(opt);
            });
            if (currentVal) sel.value = currentVal;
        } catch (e) {
            console.error('Failed to populate actors:', e);
        }
    }

    // ── Apply filters (reset and reload) ──
    function applyFilters() {
        currentOffset = 0;
        auditEntries = [];
        loadEntries();
    }

    // ── Load entries (initial or after filter) ──
    async function loadEntries() {
        const limit = getPageSize();
        const data = await fetchEntries(0, limit);
        auditEntries = data.entries;
        auditTotal = data.total;
        currentOffset = auditEntries.length;
        renderTable();
        updateLoadMore();
    }

    // ── Load More ──
    async function loadMore() {
        const limit = getPageSize();
        const data = await fetchEntries(currentOffset, limit);
        auditEntries = auditEntries.concat(data.entries);
        auditTotal = data.total;
        currentOffset = auditEntries.length;
        renderTable();
        updateLoadMore();
    }

    function updateLoadMore() {
        const wrap = document.getElementById('load-more-wrap');
        const totalEl = document.getElementById('audit-total');
        if (auditEntries.length < auditTotal) {
            wrap.style.display = '';
            wrap.querySelector('.cwoc-btn').style.display = '';
            totalEl.textContent = `Showing ${auditEntries.length} of ${auditTotal} entries`;
        } else if (auditTotal > 0) {
            wrap.style.display = '';
            wrap.querySelector('.cwoc-btn').style.display = 'none';
            totalEl.textContent = `Showing all ${auditTotal} entries`;
        } else {
            wrap.style.display = 'none';
        }
    }

    // ── Sort ──
    function toggleSort(column) {
        if (sortBy === column) {
            sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
        } else {
            sortBy = column;
            sortOrder = 'desc';
        }
        _syncSortDropdown();
        applyFilters();
    }

    function _onSortDropdownChange() {
        var val = document.getElementById('filter-sort').value;
        var parts = val.split('-');
        sortOrder = parts.pop();
        sortBy = parts.join('-');
        applyFilters();
    }

    function _syncSortDropdown() {
        var sel = document.getElementById('filter-sort');
        if (sel) sel.value = sortBy + '-' + sortOrder;
    }

    // ── Build entity link ──
    function buildEntityLink(entry) {
        const summary = escHtml(entry.entity_summary || '—');
        const eid = entry.entity_id || '';
        const etype = entry.entity_type || '';
        const action = entry.action || '';

        if (etype === 'chit') {
            if (action === 'deleted') {
                return '<a class="entity-link" href="/frontend/html/trash.html?id=' + encodeURIComponent(eid) + '">' + summary + '</a>';
            }
            return '<a class="entity-link" href="/frontend/html/editor.html?id=' + encodeURIComponent(eid) + '">' + summary + '</a>';
        }
        if (etype === 'contact') {
            return '<a class="entity-link" href="/frontend/html/contact-editor.html?id=' + encodeURIComponent(eid) + '">' + summary + '</a>';
        }
        if (etype === 'settings') {
            return '<a class="entity-link" href="/frontend/html/settings.html">' + summary + '</a>';
        }
        if (etype === 'independent_alert') {
            return '🔔 ' + summary;
        }
        return summary;
    }

    // ── Render table ──
    function renderTable() {
        const wrap = document.getElementById('audit-table-wrap');

        if (auditEntries.length === 0) {
            wrap.innerHTML = '<div class="cwoc-empty">No audit log entries found.</div>';
            return;
        }

        const colCount = columns.length + 1; // +1 for detail toggle

        let html = '<table class="cwoc-table"><thead><tr>';
        // Detail toggle column (NOT draggable)
        html += '<th style="width:30px;"></th>';
        columns.forEach((col, ci) => {
            const isActive = sortBy === col.key;
            const arrow = isActive ? (sortOrder === 'asc' ? '▲' : '▼') : '▲';
            const cls = isActive ? 'active' : '';
            html += `<th class="sortable" draggable="true" data-col-idx="${ci}" onclick="toggleSort('${col.key}')">${col.label}<span class="sort-arrow ${cls}">${arrow}</span></th>`;
        });
        html += '</tr></thead><tbody>';

        auditEntries.forEach((entry, idx) => {
            const cellMap = {
                'timestamp': escHtml(formatTimestamp(entry.timestamp)),
                'entity_summary': buildEntityLink(entry),
                'actor': escHtml(entry.actor || '—'),
                'action': '<span class="action-badge ' + (entry.action || '') + '">' + escHtml(entry.action || '—') + '</span>',
                'entity_type': escHtml(entry.entity_type || '—'),
            };
            html += `<tr>`;
            html += `<td><span class="detail-toggle" onclick="toggleDetail(${idx})" id="toggle-${idx}" title="Show changes">▶</span></td>`;
            columns.forEach(col => {
                html += `<td data-label="${escHtml(col.label)}">${cellMap[col.key]}</td>`;
            });
            html += `</tr>`;
            // Hidden detail row
            html += `<tr class="audit-detail-row" id="detail-${idx}" style="display:none;"><td colspan="${colCount}">`;
            html += renderChanges(entry.changes);
            html += `</td></tr>`;
        });

        html += '</tbody></table>';
        wrap.innerHTML = html;

        // Attach drag-and-drop listeners to column headers
        wrap.querySelectorAll('th[draggable="true"]').forEach(th => {
            th.addEventListener('dragstart', function(e) {
                _dragColIdx = parseInt(this.dataset.colIdx);
                this.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            th.addEventListener('dragend', function() {
                this.classList.remove('dragging');
                wrap.querySelectorAll('th').forEach(h => h.classList.remove('drag-over'));
            });
            th.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                this.classList.add('drag-over');
            });
            th.addEventListener('dragleave', function() {
                this.classList.remove('drag-over');
            });
            th.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('drag-over');
                const targetIdx = parseInt(this.dataset.colIdx);
                if (_dragColIdx !== null && _dragColIdx !== targetIdx) {
                    // Swap columns in the array
                    const temp = columns[_dragColIdx];
                    columns[_dragColIdx] = columns[targetIdx];
                    columns[targetIdx] = temp;
                    renderTable();
                }
                _dragColIdx = null;
            });
        });
    }

    function renderChanges(changes) {
        if (!changes || !Array.isArray(changes) || changes.length === 0) {
            return '<em style="opacity:0.6;">No field changes recorded.</em>';
        }
        let html = '<table class="audit-changes-table"><thead><tr><th>Field</th><th>Old</th><th>New</th></tr></thead><tbody>';
        changes.forEach(c => {
            const oldVal = formatChangeValue(c.old);
            const newVal = formatChangeValue(c.new);
            html += `<tr><td><strong>${escHtml(c.field || '—')}</strong></td><td class="change-old">${escHtml(oldVal)}</td><td class="change-new">${escHtml(newVal)}</td></tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    function formatChangeValue(val) {
        if (val === null || val === undefined) return '(none)';
        if (typeof val === 'object') return JSON.stringify(val);
        return String(val);
    }

    function toggleDetail(idx) {
        const row = document.getElementById('detail-' + idx);
        const toggle = document.getElementById('toggle-' + idx);
        if (!row) return;
        if (row.style.display === 'none') {
            row.style.display = '';
            toggle.textContent = '▼';
        } else {
            row.style.display = 'none';
            toggle.textContent = '▶';
        }
    }

    // ── Formatting helpers ──
    function formatTimestamp(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const mon = months[d.getMonth()];
        const day = String(d.getDate()).padStart(2, '0');
        const yr = d.getFullYear();
        const hr = String(d.getHours()).padStart(2, '0');
        const mn = String(d.getMinutes()).padStart(2, '0');
        const sc = String(d.getSeconds()).padStart(2, '0');
        return `${yr}-${mon}-${day} ${hr}:${mn}:${sc}`;
    }

    function escHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ── CSV Download ──
    function downloadCSV() {
        const params = new URLSearchParams();
        const et = getEntityType();
        const actor = getActor();
        const since = getSince();
        const until = getUntil();
        if (et)    params.set('entity_type', et);
        if (actor) params.set('actor', actor);
        if (since) params.set('since', since + 'T00:00:00');
        if (until) params.set('until', until + 'T23:59:59');
        window.location.href = '/api/audit-log/export?' + params.toString();
    }

    // ── Delete Audit Logs Modal ──

    // Compute start-of-period cutoff dates for the dropdown labels
    function _startOfPeriodCutoff(key) {
        var now = new Date();
        var d;
        if (key === '1h') {
            // Start of the current hour, minus 1 hour
            d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours() - 1, 0, 0, 0);
        } else if (key === '1d') {
            // Start of yesterday
            d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1, 0, 0, 0, 0);
        } else if (key === '1w') {
            // Start of the day 7 days ago
            d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 7, 0, 0, 0, 0);
        } else if (key === '1m') {
            // Start of the day 30 days ago
            d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 30, 0, 0, 0, 0);
        } else if (key === '1y') {
            // Start of the day 365 days ago
            d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 365, 0, 0, 0, 0);
        } else {
            return null;
        }
        return d;
    }

    function _fmtShortDate(d) {
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    function _populatePruneDropdown() {
        var sel = document.getElementById('prune-select');
        sel.innerHTML = '<option value="">Select...</option>';
        var periods = [
            { key: '1h', label: 'Past Hour' },
            { key: '1d', label: 'Past Day' },
            { key: '1w', label: 'Past Week' },
            { key: '1m', label: 'Past Month' },
            { key: '1y', label: 'Past Year' },
        ];
        periods.forEach(function(p) {
            var cutoff = _startOfPeriodCutoff(p.key);
            var label = p.label;
            if (cutoff) label += ' (older than ' + _fmtShortDate(cutoff) + ')';
            var opt = document.createElement('option');
            opt.value = p.key;
            opt.textContent = label;
            sel.appendChild(opt);
        });
        var allOpt = document.createElement('option');
        allOpt.value = 'all';
        allOpt.textContent = 'All Logs';
        sel.appendChild(allOpt);
    }

    function openDeleteModal() {
        pruneCount = 0;
        _populatePruneDropdown();
        document.getElementById('prune-select').value = '';
        document.getElementById('prune-count-display').style.display = 'none';
        document.getElementById('nuke-btn').disabled = true;
        document.getElementById('nuke-btn').textContent = '☢️ NUKE AUDIT LOGS';
        document.getElementById('download-first-cb').checked = true;
        document.getElementById('delete-modal').style.display = 'flex';
    }

    function closeDeleteModal() {
        document.getElementById('delete-modal').style.display = 'none';
    }

    async function onPruneSelectChange() {
        const val = document.getElementById('prune-select').value;
        const countDisplay = document.getElementById('prune-count-display');
        const nukeBtn = document.getElementById('nuke-btn');

        if (!val) {
            countDisplay.style.display = 'none';
            nukeBtn.disabled = true;
            nukeBtn.textContent = '☢️ NUKE AUDIT LOGS';
            return;
        }

        // Fetch count of entries that will be deleted
        try {
            let count = 0;
            if (val === 'all') {
                const resp = await fetch('/api/audit-log?limit=1&offset=0');
                if (resp.ok) {
                    const data = await resp.json();
                    count = data.total || 0;
                }
            } else {
                var cutoff = _startOfPeriodCutoff(val);
                if (cutoff) {
                    var cutoffISO = cutoff.toISOString();
                    const resp = await fetch('/api/audit-log?limit=1&offset=0&until=' + encodeURIComponent(cutoffISO));
                    if (resp.ok) {
                        const data = await resp.json();
                        count = data.total || 0;
                    }
                }
            }
            pruneCount = count;
            countDisplay.textContent = count + ' entries will be deleted.';
            countDisplay.style.display = '';
            nukeBtn.disabled = false;
            nukeBtn.textContent = '☢️ NUKE ' + count + ' AUDIT LOGS';
        } catch (e) {
            console.error('Failed to get prune count:', e);
            countDisplay.textContent = 'Could not determine count.';
            countDisplay.style.display = '';
            nukeBtn.disabled = false;
            nukeBtn.textContent = '☢️ NUKE AUDIT LOGS';
        }
    }

    // First click on NUKE → open second confirmation
    function confirmNuke() {
        document.getElementById('nuke-confirm-msg').textContent = 'NUKE ' + pruneCount + ' AUDIT LOGS?';
        document.getElementById('delete-modal').style.display = 'none';
        document.getElementById('nuke-confirm-modal').style.display = 'flex';
    }

    function closeNukeConfirm() {
        document.getElementById('nuke-confirm-modal').style.display = 'none';
        // Re-open the delete modal so user can change their mind
        document.getElementById('delete-modal').style.display = 'flex';
    }

    async function executeDelete() {
        const val = document.getElementById('prune-select').value;
        if (!val) return;

        // Download first if checked
        if (document.getElementById('download-first-cb').checked) {
            downloadCSV();
            // Small delay to let the download start
            await new Promise(r => setTimeout(r, 500));
        }

        document.getElementById('nuke-confirm-modal').style.display = 'none';
        closeDeleteModal();

        try {
            let resp;
            if (val === 'all') {
                resp = await fetch('/api/audit-log', { method: 'DELETE' });
            } else {
                resp = await fetch('/api/audit-log/trim?older_than=' + encodeURIComponent(val), { method: 'DELETE' });
            }
            if (!resp.ok) throw new Error('Delete failed');
        } catch (e) {
            console.error('Delete error:', e);
        }
        applyFilters();
        populateActors();
    }

    // ── ESC key: close modals first, then default shared-page.js behavior ──
    document.addEventListener('keydown', function(e) {
        if (e.key !== 'Escape') return;
        var nukeConfirm = document.getElementById('nuke-confirm-modal');
        if (nukeConfirm && nukeConfirm.style.display === 'flex') { closeNukeConfirm(); e.stopImmediatePropagation(); return; }
        var deleteModal = document.getElementById('delete-modal');
        if (deleteModal && deleteModal.style.display === 'flex') { closeDeleteModal(); e.stopImmediatePropagation(); return; }
        // Close filter panel if open
        var sidebar = document.querySelector('.audit-sidebar');
        if (sidebar && sidebar.classList.contains('active')) { _closeAuditFilters(); e.stopImmediatePropagation(); return; }
        // Let shared-page.js handle the rest (page exit)
    });

    // ── Read URL params for deep-linking ──
    function readUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const entityType = params.get('entity_type');
        const entityId = params.get('entity_id');

        if (entityType) {
            // Set the entity type radio
            const radio = document.querySelector('input[name="entity_type"][value="' + entityType + '"]');
            if (radio) radio.checked = true;
        }

        // If entity_id is present, add it to the query params
        if (entityId) {
            window._filterEntityId = entityId;
        }
    }

    // Override buildQueryParams to include entity_id if set
    const _origBuildQueryParams = buildQueryParams;
    buildQueryParams = function(offset, limit) {
        const qs = _origBuildQueryParams(offset, limit);
        const params = new URLSearchParams(qs);
        if (window._filterEntityId) {
            params.set('entity_id', window._filterEntityId);
        }
        return params.toString();
    };

    // ── Init ──
    async function initAuditLog() {
        readUrlParams();
        await populateActors();
        await loadEntries();
        _initMobileFilterPanel();
    }

    // ── Mobile filter slide-in panel ──
    function _initMobileFilterPanel() {
        var sidebar = document.querySelector('.audit-sidebar');
        if (!sidebar) return;

        // Create backdrop
        var backdrop = document.createElement('div');
        backdrop.className = 'audit-filter-backdrop';
        backdrop.addEventListener('click', function() { _closeAuditFilters(); });
        document.body.appendChild(backdrop);

        // Add close button inside sidebar for mobile
        var closeBtn = document.createElement('button');
        closeBtn.className = 'cwoc-btn';
        closeBtn.style.cssText = 'width:100%;margin-top:12px;';
        closeBtn.textContent = '✕ Close Filters';
        closeBtn.addEventListener('click', function() { _closeAuditFilters(); });
        sidebar.appendChild(closeBtn);

        // Show the filter toggle button on mobile
        function _checkMobile() {
            var btn = document.getElementById('audit-filter-toggle-btn');
            if (btn) btn.style.display = window.innerWidth <= 768 ? '' : 'none';
        }
        _checkMobile();
        window.addEventListener('resize', _checkMobile);
    }

    function _toggleAuditFilters() {
        var sidebar = document.querySelector('.audit-sidebar');
        var backdrop = document.querySelector('.audit-filter-backdrop');
        if (!sidebar) return;
        var isOpen = sidebar.classList.contains('active');
        if (isOpen) {
            _closeAuditFilters();
        } else {
            sidebar.classList.add('active');
            if (backdrop) backdrop.classList.add('active');
        }
    }

    function _closeAuditFilters() {
        var sidebar = document.querySelector('.audit-sidebar');
        var backdrop = document.querySelector('.audit-filter-backdrop');
        if (sidebar) sidebar.classList.remove('active');
        if (backdrop) backdrop.classList.remove('active');
    }

    initAuditLog();
    </script>
