<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Basic Email Client</title>
        <link rel="stylesheet" href="/static/email_styles.css" />
    </head>
    <body>
        <div class="container">
            <h1>Basic Email Client</h1>
            <form action="/send" method="post">
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input
                        type="text"
                        id="subject"
                        name="subject"
                        value="{{ default_subject }}"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="recipients">Recipients (comma-separated)</label>
                    <input
                        type="text"
                        id="recipients"
                        name="recipients"
                        placeholder="user@example.com"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="body">Body</label>
                    <textarea id="body" name="body" required>
{{ default_body }}</textarea
                    >
                </div>
                <button type="submit">Send Email</button>
            </form>

            <h2>Sent Emails</h2>
            <div class="email-list">
                {% for email in emails %}
                <div class="email-item">
                    <p><strong>Subject:</strong> {{ email.subject }}</p>
                    <p><strong>Recipients:</strong> {{ email.recipients }}</p>
                    <p><strong>Sent:</strong> {{ email.sent_datetime }}</p>
                    <p><strong>Body:</strong> {{ email.body }}</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </body>
</html>
