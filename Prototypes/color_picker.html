<html lang="en">
    <head>
        <title>Color Picker</title>
        <style>
            body {
                margin: 0;
                padding: 20px;
                background-color: #f5f5f5;
                transition: background-color 0.3s ease;
            }

            .field {
                margin-bottom: 15px;
            }

            .color-input {
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .color-preview {
                width: 20px;
                height: 20px;
                border-radius: 50%;
                display: inline-block;
                vertical-align: middle;
                border: 1px solid #ddd;
            }

            .color-picker {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-top: 5px;
            }

            .color-swatch {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                cursor: pointer;
                border: 2px solid transparent;
                transition: border-color 0.2s;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 2em;
            }

            .color-swatch.selected {
                border-color: #000;
            }

            .color-swatch:hover {
                border-color: #666;
            }
        </style>
    </head>
    <body>
        <div class="field">
            <label for="color"
                >Color
                <div class="color-input">
                    <span
                        id="selected-color"
                        class="color-preview"
                        style="background-color: #c66b6b"
                    ></span>
                    <input type="text" id="color" value="#C66B6B" />
                </div>
            </label>
        </div>
        <div class="color-picker">
            <div
                class="color-swatch"
                style="
                    background-color: transparent;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    font-size: 2em;
                "
                data-color="transparent"
            >
                ☒
            </div>
            <div
                class="color-swatch selected"
                style="background-color: #c66b6b"
                data-color="#C66B6B"
            ></div>
            <div
                class="color-swatch"
                style="background-color: #6bc6ab"
                data-color="#6BC6AB"
            ></div>
            <div
                class="color-swatch"
                style="background-color: #6b8ec6"
                data-color="#6B8EC6"
            ></div>
            <div
                class="color-swatch"
                style="background-color: #c6bb6b"
                data-color="#C6BB6B"
            ></div>
            <div
                class="color-swatch"
                style="background-color: #a76bc6"
                data-color="#A76BC6"
            ></div>
        </div>

        <script>
            document.querySelectorAll(".color-swatch").forEach((swatch) => {
                swatch.addEventListener("click", () => {
                    // Remove 'selected' from all swatches
                    document
                        .querySelectorAll(".color-swatch")
                        .forEach((s) => s.classList.remove("selected"));
                    // Add 'selected' to the clicked swatch
                    swatch.classList.add("selected");

                    const color = swatch.dataset.color;
                    document.getElementById("color").value = color;
                    document.getElementById(
                        "selected-color",
                    ).style.backgroundColor = color;

                    // Update body background color
                    document.body.style.backgroundColor = color;
                });
            });

            function updateColorPreview() {
                const colorInput = document.getElementById("color");
                const selectedColorSwatch =
                    document.getElementById("selected-color");
                const color = colorInput.value;
                selectedColorSwatch.style.backgroundColor = color;

                // Update body background color
                document.body.style.backgroundColor = color;

                // Optionally, update selected class on swatches if the color matches one
                document.querySelectorAll(".color-swatch").forEach((s) => {
                    if (
                        s.dataset.color &&
                        s.dataset.color.toLowerCase() === color.toLowerCase()
                    ) {
                        s.classList.add("selected");
                    } else {
                        s.classList.remove("selected");
                    }
                });
            }

            document
                .getElementById("color")
                .addEventListener("change", updateColorPreview);

            // Initialize background color on load
            window.addEventListener("DOMContentLoaded", () => {
                updateColorPreview();
            });
        </script>
    </body>
</html>
