<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alert Indicators — Property-Based Tests</title>
  <style>
    body { font-family: 'Courier New', monospace; background: #f5f0e1; color: #3b2f1e; padding: 20px; }
    h1 { border-bottom: 2px solid #8b7355; padding-bottom: 8px; }
    .test { margin: 12px 0; padding: 10px; border-left: 4px solid #ccc; background: #fff; }
    .test.pass { border-left-color: #2e7d32; }
    .test.fail { border-left-color: #c62828; }
    .test .label { font-weight: bold; }
    .test .status { margin-left: 8px; }
    .pass .status { color: #2e7d32; }
    .fail .status { color: #c62828; }
    .fail .error { margin-top: 6px; white-space: pre-wrap; font-size: 0.85em; color: #c62828; }
    #summary { margin-top: 20px; font-size: 1.1em; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Alert Indicators — Property-Based Tests</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <!-- Load shared.js (contains the functions under test) -->
  <script src="../shared.js"></script>
  <!-- Load fast-check via CDN -->
  <script src="https://unpkg.com/fast-check/lib/bundle.js"></script>

  <script>
    // ── Test harness ──────────────────────────────────────────────────────────
    var results = [];
    var resultsDiv = document.getElementById('results');

    function runProperty(name, tag, propFn) {
      var div = document.createElement('div');
      div.className = 'test';
      try {
        fc.assert(fc.property(propFn.arb, propFn.pred), { numRuns: 100 });
        div.className += ' pass';
        div.innerHTML = '<span class="label">' + name + '</span><span class="status">✓ PASS</span>' +
                        '<br><small>' + tag + '</small>';
        results.push({ name: name, passed: true });
      } catch (e) {
        div.className += ' fail';
        div.innerHTML = '<span class="label">' + name + '</span><span class="status">✗ FAIL</span>' +
                        '<br><small>' + tag + '</small>' +
                        '<div class="error">' + e.message + '</div>';
        results.push({ name: name, passed: false, error: e.message });
      }
      resultsDiv.appendChild(div);
    }

    // ── Shared generators ─────────────────────────────────────────────────────
    var ALERT_TYPES = ['alarm', 'timer', 'stopwatch', 'notification'];
    var DISPLAY_MODES = ['always', 'never', 'space'];

    /** Generate a single alert entry with a valid _type */
    var alertEntryArb = fc.constantFrom.apply(fc, ALERT_TYPES).map(function(t) {
      return { _type: t };
    });

    /** Generate a _notify_flags entry (should be excluded) */
    var notifyFlagsArb = fc.constant({ _type: '_notify_flags' });

    /** Generate an alerts array with 0-20 entries, possibly including _notify_flags */
    var alertsArrayArb = fc.array(
      fc.oneof(
        { weight: 4, arbitrary: alertEntryArb },
        { weight: 1, arbitrary: notifyFlagsArb }
      ),
      { minLength: 0, maxLength: 20 }
    );

    /** Generate a chit with random alerts array and legacy flags */
    var chitArb = fc.record({
      alerts: fc.oneof(
        alertsArrayArb,
        fc.constant(null),
        fc.constant(undefined)
      ),
      alarm: fc.oneof(fc.constant(true), fc.constant(false), fc.constant(undefined)),
      notification: fc.oneof(fc.constant(true), fc.constant(false), fc.constant(undefined))
    });

    /** Generate a chit that definitely has alerts */
    var chitWithAlertsArb = fc.record({
      alerts: fc.array(alertEntryArb, { minLength: 1, maxLength: 20 }),
      alarm: fc.oneof(fc.constant(true), fc.constant(false), fc.constant(undefined)),
      notification: fc.oneof(fc.constant(true), fc.constant(false), fc.constant(undefined))
    });

    /** Generate a display mode */
    var displayModeArb = fc.constantFrom('always', 'never', 'space');

    // ── Helper: compute expected _chitHasAlerts result ─────────────────────────
    function expectedHasAlerts(chit) {
      if (!chit) return false;
      var alerts = chit.alerts;
      if (Array.isArray(alerts)) {
        for (var i = 0; i < alerts.length; i++) {
          if (alerts[i] && ALERT_TYPES.indexOf(alerts[i]._type) !== -1) return true;
        }
      }
      if (chit.alarm === true || chit.notification === true) return true;
      return false;
    }

    // ══════════════════════════════════════════════════════════════════════════
    // Property 3: Alert detection with legacy flags
    // Validates: Requirements 1.3, 2.1
    // ══════════════════════════════════════════════════════════════════════════
    runProperty(
      'Property 3: Alert detection with legacy flags',
      'Feature: alert-indicators-display, Property 3: Alert detection with legacy flags',
      {
        arb: chitArb,
        pred: function(chit) {
          var actual = _chitHasAlerts(chit);
          var expected = expectedHasAlerts(chit);
          return actual === expected;
        }
      }
    );

    // ══════════════════════════════════════════════════════════════════════════
    // Property 7: Backward-compatible defaults
    // Validates: Requirements 4.5, 6.1, 6.2
    // ══════════════════════════════════════════════════════════════════════════
    (function() {
      // Generate a visual_indicators object with random subsets of keys missing
      var viArb = fc.record({
        combine_alerts: fc.oneof(fc.constant(true), fc.constant(false), fc.constant(undefined)),
        timer:          fc.oneof(displayModeArb, fc.constant(undefined)),
        stopwatch:      fc.oneof(displayModeArb, fc.constant(undefined)),
        combined_alert: fc.oneof(displayModeArb, fc.constant(undefined)),
        alarm:          fc.oneof(displayModeArb, fc.constant(undefined)),
        notification:   fc.oneof(displayModeArb, fc.constant(undefined))
      });

      // We need a chit with alerts to actually exercise the indicator logic
      var arbTuple = fc.tuple(chitWithAlertsArb, viArb);

      runProperty(
        'Property 7: Backward-compatible defaults',
        'Feature: alert-indicators-display, Property 7: Backward-compatible defaults',
        {
          arb: arbTuple,
          pred: function(tuple) {
            var chit = tuple[0];
            var vi = tuple[1];

            // Build a "filled" settings object with expected defaults applied
            var filled = {};
            filled.combine_alerts = (vi.combine_alerts === true) ? true : false;
            filled.timer = (vi.timer !== undefined) ? vi.timer : 'always';
            filled.stopwatch = (vi.stopwatch !== undefined) ? vi.stopwatch : 'always';
            filled.combined_alert = (vi.combined_alert !== undefined) ? vi.combined_alert : 'always';
            // alarm and notification should be preserved as-is (no default override)
            if (vi.alarm !== undefined) filled.alarm = vi.alarm;
            if (vi.notification !== undefined) filled.notification = vi.notification;

            // Test in card context (exercises individual mode when combine_alerts is false)
            var resultWithOriginal = _getAlertIndicators(chit, vi, 'card');
            var resultWithFilled   = _getAlertIndicators(chit, filled, 'card');
            if (resultWithOriginal !== resultWithFilled) return false;

            // Also test in calendar-month context (exercises combined mode)
            var calOriginal = _getAlertIndicators(chit, vi, 'calendar-month');
            var calFilled   = _getAlertIndicators(chit, filled, 'calendar-month');
            if (calOriginal !== calFilled) return false;

            return true;
          }
        }
      );
    })();

    // ══════════════════════════════════════════════════════════════════════════
    // Property 1: Calendar display mode correctness
    // Validates: Requirements 1.1, 1.4, 1.5
    // ══════════════════════════════════════════════════════════════════════════
    (function() {
      var calContextArb = fc.constantFrom('calendar-month', 'calendar-slot');
      var arbTuple = fc.tuple(chitArb, displayModeArb, calContextArb);

      runProperty(
        'Property 1: Calendar display mode correctness',
        'Feature: alert-indicators-display, Property 1: Calendar display mode correctness',
        {
          arb: arbTuple,
          pred: function(tuple) {
            var chit = tuple[0];
            var mode = tuple[1];
            var ctx  = tuple[2];

            var settings = { combined_alert: mode };
            var result = _getAlertIndicators(chit, settings, ctx);
            var hasAlerts = _chitHasAlerts(chit);

            // Should show iff chit has alerts AND _shouldShow(mode, ctx) is true
            var shouldDisplay = hasAlerts && _shouldShow(mode, ctx);
            var containsIcon = result.indexOf('⚠️') !== -1;

            return shouldDisplay === containsIcon;
          }
        }
      );
    })();

    // ══════════════════════════════════════════════════════════════════════════
    // Property 2: Calendar icon uniqueness
    // Validates: Requirements 1.2
    // ══════════════════════════════════════════════════════════════════════════
    (function() {
      // Chits with 1-20 alerts of mixed types
      var multiAlertChitArb = fc.record({
        alerts: fc.array(alertEntryArb, { minLength: 1, maxLength: 20 }),
        alarm: fc.oneof(fc.constant(true), fc.constant(false), fc.constant(undefined)),
        notification: fc.oneof(fc.constant(true), fc.constant(false), fc.constant(undefined))
      });
      var calContextArb = fc.constantFrom('calendar-month', 'calendar-slot');
      var arbTuple = fc.tuple(multiAlertChitArb, displayModeArb, calContextArb);

      runProperty(
        'Property 2: Calendar icon uniqueness',
        'Feature: alert-indicators-display, Property 2: Calendar icon uniqueness',
        {
          arb: arbTuple,
          pred: function(tuple) {
            var chit = tuple[0];
            var mode = tuple[1];
            var ctx  = tuple[2];

            var settings = { combined_alert: mode };
            var result = _getAlertIndicators(chit, settings, ctx);

            // Count occurrences of ⚠️
            var count = 0;
            var idx = -1;
            while ((idx = result.indexOf('⚠️', idx + 1)) !== -1) {
              count++;
            }
            return count <= 1;
          }
        }
      );
    })();

    // ══════════════════════════════════════════════════════════════════════════
    // Property 4: Combined mode shows single universal icon on cards
    // Validates: Requirements 2.4
    // ══════════════════════════════════════════════════════════════════════════
    (function() {
      runProperty(
        'Property 4: Combined mode single icon on cards',
        'Feature: alert-indicators-display, Property 4: Combined mode shows single universal icon on cards',
        {
          arb: chitWithAlertsArb,
          pred: function(chit) {
            var settings = { combine_alerts: true, combined_alert: 'always' };
            var result = _getAlertIndicators(chit, settings, 'card');
            return result === '⚠️ ';
          }
        }
      );
    })();

    // ══════════════════════════════════════════════════════════════════════════
    // Property 5: Individual mode per-type icons on cards
    // Validates: Requirements 2.5, 2.6
    // ══════════════════════════════════════════════════════════════════════════
    (function() {
      var perTypeModeArb = fc.record({
        alarm:        displayModeArb,
        notification: displayModeArb,
        timer:        displayModeArb,
        stopwatch:    displayModeArb
      });
      var arbTuple = fc.tuple(chitWithAlertsArb, perTypeModeArb);

      var ICON_MAP = {
        alarm:        '🔔 ',
        notification: '📢 ',
        timer:        '⏱️ ',
        stopwatch:    '⏲️ '
      };

      runProperty(
        'Property 5: Individual mode per-type icons on cards',
        'Feature: alert-indicators-display, Property 5: Individual mode shows correct per-type icons on cards',
        {
          arb: arbTuple,
          pred: function(tuple) {
            var chit = tuple[0];
            var modes = tuple[1];

            var settings = {
              combine_alerts: false,
              alarm:        modes.alarm,
              notification: modes.notification,
              timer:        modes.timer,
              stopwatch:    modes.stopwatch
            };
            var result = _getAlertIndicators(chit, settings, 'card');

            // Determine which types are present
            var present = _chitAlertTypesPresent(chit);

            // Build expected result
            var expected = '';
            for (var i = 0; i < ALERT_TYPES.length; i++) {
              var t = ALERT_TYPES[i];
              if (present[t] && _shouldShow(modes[t], 'card')) {
                expected += ICON_MAP[t];
              }
            }
            return result === expected;
          }
        }
      );
    })();

    // ══════════════════════════════════════════════════════════════════════════
    // Property 6: "If Space" resolves to show for non-month contexts
    // Validates: Requirements 5.2, 5.3
    // ══════════════════════════════════════════════════════════════════════════
    (function() {
      var nonMonthCtxArb = fc.constantFrom('card', 'calendar-slot');
      var arbTuple = fc.tuple(chitWithAlertsArb, nonMonthCtxArb);

      runProperty(
        'Property 6: "If Space" resolves to show for non-month contexts',
        'Feature: alert-indicators-display, Property 6: If Space resolves to show for non-month contexts',
        {
          arb: arbTuple,
          pred: function(tuple) {
            var chit = tuple[0];
            var ctx  = tuple[1];

            // Settings with "space" mode for combined_alert
            var spaceSettings = { combined_alert: 'space', combine_alerts: true };
            var alwaysSettings = { combined_alert: 'always', combine_alerts: true };

            var spaceResult  = _getAlertIndicators(chit, spaceSettings, ctx);
            var alwaysResult = _getAlertIndicators(chit, alwaysSettings, ctx);

            if (spaceResult !== alwaysResult) return false;

            // Also test individual mode with "space" for each type
            var spaceIndiv = {
              combine_alerts: false,
              alarm: 'space', notification: 'space', timer: 'space', stopwatch: 'space'
            };
            var alwaysIndiv = {
              combine_alerts: false,
              alarm: 'always', notification: 'always', timer: 'always', stopwatch: 'always'
            };

            // Only test in card context for individual mode (calendar-slot uses combined path)
            if (ctx === 'card') {
              var spaceIndivResult  = _getAlertIndicators(chit, spaceIndiv, ctx);
              var alwaysIndivResult = _getAlertIndicators(chit, alwaysIndiv, ctx);
              if (spaceIndivResult !== alwaysIndivResult) return false;
            }

            return true;
          }
        }
      );
    })();

    // ── Summary ───────────────────────────────────────────────────────────────
    var passed = results.filter(function(r) { return r.passed; }).length;
    var total = results.length;
    var summaryDiv = document.getElementById('summary');
    summaryDiv.textContent = passed + ' / ' + total + ' properties passed';
    summaryDiv.style.color = (passed === total) ? '#2e7d32' : '#c62828';
  </script>
</body>
</html>
