<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/static/cwod_logo-favicon.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Forecast — C.W.'s Omni Chits</title>

    <link rel="stylesheet" href="/frontend/shared-page.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
        /* ══ Weather Page Styles ══ */

        /* ── Empty state ── */
        .weather-empty {
            text-align: center;
            padding: 3em 1em;
            color: var(--aged-brown-dark, #4a2c2a);
            font-size: 1.1em;
            opacity: 0.7;
        }
        .weather-empty a {
            color: var(--aged-brown-medium, #8b4513);
            text-decoration: underline;
            cursor: pointer;
        }

        /* ── Loading state ── */
        .weather-loading {
            text-align: center;
            padding: 2em;
            color: var(--aged-brown-dark, #4a2c2a);
            opacity: 0.7;
        }

        /* ── Date header row ── */
        .weather-date-row {
            display: flex;
            padding-left: 160px;
            gap: 4px;
            margin-bottom: 4px;
        }
        .weather-date-header {
            min-width: 90px;
            max-width: 90px;
            text-align: center;
            font-size: 0.75em;
            color: var(--aged-brown-dark, #4a2c2a);
            font-weight: bold;
            padding: 4px 2px;
        }
        .weather-date-header .date-dow {
            display: block;
            font-size: 0.9em;
            opacity: 0.7;
        }

        /* ── Weather table (scrollable container) ── */
        .weather-table {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }

        /* ── Weather row (one per location) ── */
        .weather-row {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            align-items: stretch;
        }

        /* ── Row header (location label + address) ── */
        .weather-row-header {
            min-width: 156px;
            max-width: 156px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 8px 6px;
            background: var(--header-bg, #e0d4b5);
            border: 1px solid var(--aged-brown-medium, #8b4513);
            border-radius: 5px;
            flex-shrink: 0;
        }
        .weather-row-header .loc-label {
            font-weight: bold;
            font-size: 0.9em;
            color: var(--aged-brown-dark, #4a2c2a);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .weather-row-header .loc-address {
            font-size: 0.7em;
            color: var(--aged-brown-light, #a0522d);
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* ── Day block (one per forecast day) ── */
        .weather-day-block {
            min-width: 90px;
            max-width: 90px;
            background: #fff8e1;
            border: 1px solid var(--aged-brown-medium, #8b4513);
            border-radius: 5px;
            padding: 6px 4px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }
        .weather-day-block .wx-icon {
            font-size: 1.4em;
            line-height: 1;
        }
        .weather-day-block .wx-temps {
            font-size: 0.8em;
            font-weight: bold;
            color: var(--aged-brown-dark, #4a2c2a);
        }
        .weather-day-block .wx-high {
            color: #b22222;
        }
        .weather-day-block .wx-low {
            color: #4682b4;
        }
        .weather-day-block .wx-precip {
            font-size: 0.7em;
            color: var(--aged-brown-light, #a0522d);
            opacity: 0.8;
        }

        /* ── Today highlight ── */
        .weather-day-block.today {
            border-color: var(--accent-gold, #d4af37);
            border-width: 2px;
            background: #fffde7;
        }

        /* ── Error row ── */
        .weather-row-error {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            align-items: center;
        }
        .weather-row-error .error-msg {
            color: var(--danger-red, #b22222);
            font-size: 0.9em;
            padding: 8px;
        }

        /* ── Responsive: tablet ── */
        @media (max-width: 768px) {
            .weather-date-row {
                padding-left: 100px;
            }
            .weather-row-header {
                min-width: 96px;
                max-width: 96px;
            }
            .weather-day-block {
                min-width: 76px;
                max-width: 76px;
            }
            .weather-date-header {
                min-width: 76px;
                max-width: 76px;
            }
        }

        /* ── Responsive: mobile ── */
        @media (max-width: 480px) {
            .weather-date-row {
                padding-left: 70px;
            }
            .weather-row-header {
                min-width: 66px;
                max-width: 66px;
                padding: 4px;
            }
            .weather-row-header .loc-label {
                font-size: 0.75em;
            }
            .weather-row-header .loc-address {
                display: none;
            }
            .weather-day-block {
                min-width: 64px;
                max-width: 64px;
                padding: 4px 2px;
            }
            .weather-date-header {
                min-width: 64px;
                max-width: 64px;
                font-size: 0.65em;
            }
            .weather-day-block .wx-icon {
                font-size: 1.1em;
            }
            .weather-day-block .wx-temps {
                font-size: 0.7em;
            }
            .weather-day-block .wx-precip {
                font-size: 0.6em;
            }
        }
    </style>
</head>
<body data-page-title="Weather Forecast" data-page-icon="🌤️">

    <div class="settings-panel">
        <div id="weather-content">
            <div class="weather-loading">
                <div class="loader"></div>
                Loading forecasts…
            </div>
        </div>
    </div>

    <script src="/frontend/shared.js"></script>
    <script src="/frontend/shared-page.js"></script>
    <script src="/frontend/weather.js"></script>
</body>
</html>
