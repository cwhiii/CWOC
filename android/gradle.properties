# Project-wide Gradle settings

# AndroidX package structure
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# Enable Compose compiler metrics (optional, for debugging)
# android.enableComposeCompilerMetrics=true

# Gradle JVM args
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable non-transitive R classes
android.nonTransitiveRClass=true

# Enable build cache
org.gradle.caching=true

# Plain console output (no ANSI colors) — makes Build tab output readable
org.gradle.console=plain

# Use the current JDK directly (skip toolchain auto-detection)
org.gradle.java.home=/usr/lib/jvm/java-21-openjdk

# Write ALL Gradle output to a log file (includes Kotlin compiler errors)
org.gradle.logging.level=info
